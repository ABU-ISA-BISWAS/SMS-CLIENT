<div class="modal-body text-center pt-0">
    <h4 class="modal-title fw-bold mb-2">Two-Factor Authentication</h4>
    <p class="text-muted small fw-medium mb-4">
        For your security, enter the 6-digit code sent to your registered mobile/email.
    </p>

    <div class="mb-4">
        <label for="otp-code" class="form-label fs-6 fw-semibold">Verification Code</label>
        <div class="otp-inputs d-flex justify-content-center gap-2">
            <input
                *ngFor="let digit of otp; let i = index"
                type="text"
                id="otp-input-{{ i }}"
                class="form-control text-center otp-input"
                maxlength="1"
                [value]="digit"
                (input)="onOtpInputChange($event, i)"
                (keydown)="onKeyDown($event, i)"
                (paste)="i === 0 && onPaste($event)"
                autocomplete="one-time-code"
            />
        </div>
    </div>

    <div class="d-flex justify-content-between mb-4 px-3">
        <a href="javascript:void(0)" (click)="resendCode()"
            class="text-decoration-none text-muted fw-semibold resend-link small">Resend Code</a>
        <a href="javascript:void(0)" (click)="tryAnotherWay()"
            class="text-decoration-none fw-semibold try-another-link small">Try another Way</a>
    </div>

    <div class="d-flex gap-2 mb-4">
        <button type="button" class="btn btn-outline-secondary flex-fill py-2" (click)="goBack()">
            <i class="bi bi-arrow-left me-2"></i> Back
        </button>
        <!-- <button type="submit" class="btn base-btn-primary flex-fill py-2 fw-medium" (click)="verifyAndContinue()">
            Verify & Continue
        </button> -->
        <button type="submit" class="btn base-btn-primary flex-fill py-2 fw-medium" routerLink="/">
            Verify & Continue
        </button>
    </div>

    <div class="text-center text-muted fs-7">
        <p class="mb-1">
            <i class="bi bi-question-circle me-1"></i> Need help?
        </p>
        <p>This helps protect your account. Never share your OTP with anyone.</p>
    </div>
</div>
