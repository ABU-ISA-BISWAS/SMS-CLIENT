<div class="container-fluid">
    <div class="row">
        <div class="col-12">
            <tabset id="server-usage-details">
                
                <!-- Last 24 hours -->
                <tab heading="Last 24 hours" class="px-3">
                    <accordion [isAnimated]="true" class="mt-4">

                        <accordion-group heading="Outgoing Traffic" class="mt-3" [isOpen]="true">
                            <div class="card-body p-0">
                                <highcharts-chart
                                    [Highcharts]="Highcharts"
                                    [options]="outgoingTrafficChartOptions"
                                    style="width: 100%; height: 250px; display: block;"
                                ></highcharts-chart>
                            </div>
                        </accordion-group>

                        <accordion-group heading="Incoming Traffic" class="mt-3" [isOpen]="true">
                            <div class="card-body p-0">
                                <highcharts-chart
                                    [Highcharts]="Highcharts"
                                    [options]="incomingTrafficChartOptions"
                                    style="width: 100%; height: 250px; display: block;"
                                ></highcharts-chart>
                            </div>
                        </accordion-group>

                    </accordion>
                </tab>
