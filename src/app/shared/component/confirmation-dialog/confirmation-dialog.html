<!-- Modal Header (close button only) -->
<div class="modal-header border-0 pb-0 pe-3 pt-3">
  <button
    type="button"
    class="confirm-close-btn btn btn-sm btn-light border ms-auto"
    aria-label="Close"
    (click)="onCancel()"
  >
    <i class="ti ti-x fs-13px" aria-hidden="true"></i>
  </button>
</div>

<!-- Modal Body -->
<div class="modal-body confirm-body text-center px-4 pb-4 pt-2">
  <!-- Icon -->
  <div class="confirm-icon-wrap mb-3">
    <div class="confirm-icon">
      <i class="ti ti-help" aria-hidden="true"></i>
    </div>
  </div>

  <!-- Title & Subtitle -->
  <h5 class="confirm-title" [innerHTML]="title"></h5>
  <p class="confirm-subtitle">
    Please review the details before confirming this action.
  </p>

  <!-- Cancel Reason (conditional) -->
  <div *ngIf="cancelFlag" class="confirm-field-card text-start mb-3">
    <label class="confirm-field-label">
      Cancel reason <span class="text-danger">*</span>
    </label>
    <div class="confirm-input-wrap">
      <i class="ti ti-message confirm-input-icon" aria-hidden="true"></i>
      <input
        type="text"
        class="form-control confirm-input"
        placeholder="Enter reason for cancellation"
        [(ngModel)]="cancelReason"
        (ngModelChange)="
          cancelReason.length > 0
            ? (cancelReasonChecker = false)
            : (cancelReasonChecker = true)
        "
      />
    </div>
  </div>

  <!-- Personal Number Confirm (conditional) -->
  <div *ngIf="personalNumber" class="confirm-field-card text-start mb-3">
    <label class="confirm-field-label">Confirm personal number</label>
    <div class="confirm-input-wrap">
      <i class="ti ti-id-badge confirm-input-icon" aria-hidden="true"></i>
      <input
        type="text"
        class="form-control confirm-input"
        placeholder="Enter your personal number"
        [(ngModel)]="validationString"
        (ngModelChange)="
          validationString == personalNumber
            ? (unitCheck = false)
            : (unitCheck = true)
        "
      />
    </div>
  </div>

  <!-- Divider -->
  <hr class="confirm-divider" />

  <!-- Action Buttons -->
  <div class="confirm-btn-row">
    <button
      type="button"
      class="btn btn-sm confirm-btn-no fw-medium"
      (click)="onCancel()"
    >
      <i class="ti ti-x fs-13px me-1" aria-hidden="true"></i>
      No, cancel
    </button>
    <button
      type="button"
      class="btn btn-sm confirm-btn-yes fw-medium"
      (click)="onConfirm()"
      [disabled]="cancelReasonChecker || unitCheck"
    >
      <i class="ti ti-check fs-13px me-1" aria-hidden="true"></i>
      Yes, confirm
    </button>
  </div>
</div>
