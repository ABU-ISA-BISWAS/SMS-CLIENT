<!-- Modal Header -->
<div class="modal-header border-0 pb-0">
  <div class="d-flex align-items-center gap-2">
    <div class="modal-header-icon">
      <i class="ti ti-lock fs-16px" aria-hidden="true"></i>
    </div>
    <div>
      <h6 class="modal-title m-0 fw-bold base-txt-primary lh-1">
        Change Password
      </h6>
      <small class="text-body-secondary fs-11px"
        >Update account credentials</small
      >
    </div>
  </div>
  <button
    type="button"
    class="modal-close-btn btn btn-sm btn-light border"
    aria-label="Close"
    (click)="bsModalRef.hide()"
  >
    <i class="ti ti-x fs-13px" aria-hidden="true"></i>
  </button>
</div>

<!-- Modal Body -->
<div class="modal-body pt-3 pb-2">
  <!-- User Info Bar (readonly) -->
  <div class="user-info-bar mb-3">
    <div class="user-info-item">
      <span class="user-info-label">User ID</span>
      <span class="user-info-value">{{ user.userId }}</span>
    </div>
    <div class="user-info-divider"></div>
    <div class="user-info-item">
      <span class="user-info-label">Username</span>
      <span class="user-info-value">{{ user.userName }}</span>
    </div>
  </div>

  <!-- New Password Field -->
  <div class="field-group">
    <label class="field-label">
      New Password <span class="text-danger">*</span>
    </label>
    <div class="input-field-wrapper">
      <i class="ti ti-lock-password field-icon-left" aria-hidden="true"></i>
      <input
        [type]="showPassword ? 'text' : 'password'"
        class="form-control field-input"
        placeholder="Enter new password"
        autocomplete="off"
        [(ngModel)]="user.password"
        (ngModelChange)="validatePass()"
        [ngClass]="{ 'is-invalid': invalidPassword }"
      />
      <i
        class="field-icon-right"
        [class]="showPassword ? 'ti ti-eye' : 'ti ti-eye-off'"
        (click)="showPassword = !showPassword"
        style="cursor: pointer"
        aria-hidden="true"
      >
      </i>
    </div>
    <div *ngIf="invalidPassword" class="field-error">
      <i class="ti ti-alert-circle fs-12px" aria-hidden="true"></i>
      Password must be at least 6 characters!
    </div>
    <div *ngIf="!invalidPassword" class="field-hint">
      Minimum 6 characters required
    </div>
  </div>
</div>

<!-- Modal Footer -->
<div class="modal-footer border-0 modal-footer-custom">
  <button
    type="button"
    class="btn btn-sm btn-light border fw-medium px-4 fixed-width-btn"
    (click)="bsModalRef.hide()"
  >
    Close
  </button>
  <button
    type="button"
    class="btn btn-sm base-btn-primary fw-medium px-4 fixed-width-btn"
    (click)="changePassword()"
    [disabled]="isSaving"
  >
    <i
      *ngIf="isSaving"
      class="ti ti-loader-2 spin me-1 fs-13px"
      aria-hidden="true"
    ></i>
    {{ isSaving ? "Saving..." : "Save" }}
  </button>
</div>
