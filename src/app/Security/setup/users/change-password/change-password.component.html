<div class="modal-header border-0">
  <h6 class="modal-title m-0 fw-bold base-txt-primary">Change Password</h6>
  <button type="button" class="btn-close close pull-right fs-13px btn btn-sm btn-light" aria-label="Close"
    (click)="bsModalRef.hide()">
    <span aria-hidden="true" class="visually-hidden">&times;</span>
  </button>
</div>


<div class="modal-body">

  <div class="userInfoTop pb-3 pt-3 mb-2">
    <div class="row">
      <div class="col-md-12 col-sm-12">

        <div class="input-group required mb-2 positionRelative">
          <span class="input-group-text base-bg-subtle-primary base-txt-primary"><strong>User ID:</strong></span>
          <input type="text" class="form-control rounded" disabled [(ngModel)]="user.userId" />
        </div>

        <div class="input-group required mb-2 positionRelative">
          <span class="input-group-text base-bg-subtle-primary base-txt-primary"><strong>Username:</strong></span>
          <input type="text" class="form-control rounded" disabled [(ngModel)]="user.userName" />
        </div>

        <div class="input-group required mb-2 positionRelative">
          <span class="input-group-text base-bg-subtle-primary base-txt-primary"><strong>Password:</strong></span>
          <input type="password" class="form-control rounded" [(ngModel)]="user.password" (ngModelChange)="validatePass()"
            [ngClass]="{'invalid-input':invalidPassword}" autocomplete="off">
          <span *ngIf="invalidPassword" class="offset-md-3 pl-md-3 text-danger">Password must be at least 06
            character!</span>
        </div>
      </div>
    </div>

  </div>

</div>

<div class="modal-footer border-0 bg-light">
  <button type="button" class="btn btn-sm btn-light fw-medium close px-3 m-0 text-body-secondary fixed-width-btn"
    (click)="bsModalRef.hide()">Close</button>
  <button type="button" class="btn btn-sm base-btn-primary fw-medium py-1 px-3 m-0 ms-3 fixed-width-btn"
    (click)="changePassword()" [disabled]="isSaving">
    {{ isSaving ? 'Saving' : 'Save'}}
  </button>
</div>
