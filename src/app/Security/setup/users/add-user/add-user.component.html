<div class="modal-header border-0">
  <h6 class="modal-title m-0 fw-bold base-txt-primary">{{ title }}</h6>
  <button
    type="button"
    class="btn-close close pull-right fs-13px btn btn-sm btn-light"
    aria-label="Close"
    (click)="bsModalRef.hide()"
  >
    <span aria-hidden="true" class="visually-hidden">&times;</span>
  </button>
</div>

<div class="modal-body">
  <!-- Action Bar -->
  <div class="card border border-2 action-bar mb-2 bg-light">
    <div
      class="card-body d-flex flex-wrap gap-2 justify-content-xxl-end justify-content-end py-1 px-3"
    >
      <button
        type="button"
        (click)="bsModalRef.hide()"
        class="btn btn-sm btn-danger fw-medium px-3 mb-xxl-0"
        data-dismiss="modal"
      >
        Close
      </button>

      <button
        type="button"
        class="btn btn-sm base-btn-primary fw-medium py-1 px-3 m-0 ms-3 fixed-width-btn"
        (click)="saveUpdateUser()"
        [disabled]="isSaving || invalidId || invalidUser || invalidPassword"
      >
        {{ isSaving ? "Saving" : "Save" }}
      </button>
    </div>
  </div>

  <!-- patient Info -->
  <div class="patient-info bg-light p-3 rounded border mb-2">
    <div class="row g-2">
      <div class="col-md-4 col-sm-6 col-12">
        <div class="form-group">
          <label for="empInfo" class="form-label base-txt-primary"
            >Emp. Info:</label
          >
          <div class="input-group required">
            <input
              type="text"
              id="empInfo"
              class="form-control form-control-sm"
              [(ngModel)]="empSelect"
              [typeahead]="employeeDatasource"
              (typeaheadLoading)="changeTypeaheadLoading($event)"
              (typeaheadNoResults)="typeaheadNoResults($event)"
              (typeaheadOnSelect)="selectEmployee($event)"
              [typeaheadOptionsLimit]="7"
              [typeaheadMinLength]="3"
              [typeaheadItemTemplate]="customEmpTemplate"
              typeaheadOptionField="doctorName"
              (keydown.backspace)="onEmpBackspace()"
              placeholder="Search by ID or Name"
              autocomplete="off"
            />
          </div>

          <ng-template #customEmpTemplate let-model="item" let-index="index">
            <table>
              <tr>
                <td class="float-left" style="width: 100%">
                  <label class="doctorTilte">Name</label>
                  <span class="docSpan">: {{ model.empName }}</span>
                </td>
                <td class="float-right" style="width: 100%">
                  <label class="doctorTilte">ID</label>
                  <span class="docSpan">: {{ model.empId }}</span>
                </td>
              </tr>
            </table>
          </ng-template>
        </div>
      </div>

      <div class="col-md-4 col-sm-6 col-12">
        <div class="form-group">
          <label for="userId" class="form-label base-txt-primary"
            >User ID:</label
          >
          <div class="input-group required">
            <input
              type="text"
              id="userId"
              class="form-control form-control-sm"
              [(ngModel)]="user.userId"
              (blur)="validateUser()"
              (ngModelChange)="invalidId = false"
              [ngClass]="{ 'invalid-input': invalidId }"
              (keydown.space)="$event.preventDefault()"
              required
            />
          </div>
        </div>
      </div>

      <div class="col-md-4 col-sm-6 col-12">
        <div class="form-group">
          <label for="userName" class="form-label base-txt-primary"
            >Username:</label
          >
          <div class="input-group required">
            <input
              type="text"
              id="userName"
              class="form-control form-control-sm"
              [(ngModel)]="user.userName"
              (blur)="validateUser()"
              (ngModelChange)="invalidUser = false"
              [ngClass]="{ 'invalid-input': invalidUser }"
              (keydown.space)="$event.preventDefault()"
            />
          </div>
        </div>
      </div>

      <div class="col-md-4 col-sm-6 col-12" *ngIf="showPassword">
        <div class="form-group">
          <label for="password" class="form-label base-txt-primary"
            >Password:</label
          >
          <div class="input-group required">
            <input
              type="password"
              id="password"
              class="form-control form-control-sm"
              [(ngModel)]="user.password"
              (blur)="validatePassword()"
              (ngModelChange)="invalidPassword = false"
              [ngClass]="{ 'invalid-input': invalidPassword }"
              (keydown.space)="$event.preventDefault()"
              autocomplete="off"
            />
          </div>
        </div>
      </div>

      <div class="col-md-4 col-sm-6 col-12">
        <div class="form-group">
          <label for="personalId" class="form-label base-txt-primary"
            >Personal ID:</label
          >
          <div class="input-group required">
            <input
              type="text"
              id="personalId"
              class="form-control form-control-sm"
              [(ngModel)]="user.personalNumber"
              autocomplete="off"
            />
          </div>
        </div>
      </div>

      <div class="col-md-4 col-sm-6 col-12">
        <div class="form-group">
          <label for="defaultPageLink" class="form-label base-txt-primary"
            >Default Pagelink:</label
          >
          <div class="input-group required">
            <input
              type="text"
              id="defaultPageLink"
              class="form-control form-control-sm"
              [(ngModel)]="user.defaultPageLink"
            />
          </div>
        </div>
      </div>

      <div class="col-md-4 col-sm-6 col-12">
        <div class="form-group">
          <label for="expiryDate" class="form-label base-txt-primary"
            >Expiry Date:</label
          >
          <div class="input-group required">
            <input
              type="text"
              id="expiryDate"
              class="form-control form-control-sm"
              [(ngModel)]="user.accountExpireDate"
              bsDatepicker
              [bsConfig]="{ dateInputFormat: 'DD/MM/YYYY' }"
              [minDate]="today"
            />
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Flags -->
  <div class="card flags mb-2">
    <div class="card-header">Flags</div>
    <div class="card-body">
      <div class="d-flex flex-wrap">
        <div class="form-check me-3 mb-2 mb-md-0">
          <input
            class="form-check-input me-2"
            type="checkbox"
            id="activeStatus"
            [(ngModel)]="user.activeStatus"
          />
          <label class="form-check-label" for="activeStatus">
            Active Status
          </label>
        </div>

        <div class="form-check me-3 mb-2 mb-md-0">
          <input
            class="form-check-input me-2"
            type="checkbox"
            id="accountExpired"
            [(ngModel)]="user.accountExpired"
          />
          <label class="form-check-label" for="accountExpired">
            Expiry Status
          </label>
        </div>

        <div class="form-check me-3 mb-2 mb-md-0">
          <input
            class="form-check-input me-2"
            type="checkbox"
            id="enabled"
            [(ngModel)]="user.enabled"
          />
          <label class="form-check-label" for="enabled">
            Account Enabled?
          </label>
        </div>

        <div class="form-check me-3 mb-2 mb-md-0">
          <input
            class="form-check-input me-2"
            type="checkbox"
            id="pwdChangeRequired"
            [(ngModel)]="user.pwdChangeRequired"
          />
          <label class="form-check-label" for="pwdChangeRequired">
            Password Change Required
          </label>
        </div>
      </div>
    </div>
  </div>

  <!-- Employee Info -->
  @if (showInfo) {
    <div class="patient-info bg-light p-3 rounded border mb-2">
      <div class="row g-2">
        <div class="col-md-4 col-sm-6 col-12">
          <div class="info-group">
            <label class="form-label info-label">Emp. ID :</label>
            <div class="info-value base-bg-subtle-primary py-1 px-2 rounded">
              {{ selectedEmp?.empId || receivedEmp?.empId }}
            </div>
          </div>
        </div>

        <div class="col-md-4 col-sm-6 col-12">
          <div class="info-group">
            <label class="form-label info-label">Emp. Name :</label>
            <div class="info-value base-bg-subtle-primary py-1 px-2 rounded">
              {{ selectedEmp?.fname || receivedEmp?.fname }}
            </div>
          </div>
        </div>

        <div class="col-md-4 col-sm-6 col-12">
          <div class="info-group">
            <label class="form-label info-label">Department :</label>
            <div class="info-value base-bg-subtle-primary py-1 px-2 rounded">
              {{ deptName }}
            </div>
          </div>
        </div>
      </div>
    </div>
  }
</div>

<!-- divider -->
<hr />

<div class="modal-body">
  <tabset class="tab-menu-style" type="pills">
    <tab heading="Modules & Features">
      <div id="userInfo" class="tab-pane active pt-1">
        <div class="row">
          <div class="col-md-12 accordionCustom paddingLeft0 paddingRight0">
            <div class="col-md-12 text-right mb-2">
              <button
                type="button"
                class="btn btn-info btnAcc"
                (click)="toggleTabs()"
              >
                <i class="fas fa-hand-pointer"></i> {{ toggleButton }}
              </button>
            </div>
            <div class="col-md-12">
              <accordion class="base-accordion">
                @for (module of moduleList3; track $index) {
                  <accordion-group
                    [heading]="module.displayName"
                    [isOpen]="isOpen"
                  >
                    <app-sub-module
                      [parent]="self"
                      [subModules]="module"
                    ></app-sub-module>
                  </accordion-group>
                }
              </accordion>
            </div>
          </div>
        </div>
      </div>
    </tab>
    <tab heading="Role">
      <div id="userInfo" class="tab-pane active pt-1">
        <div class="row">
          <div class="col-md-6 offset-md-6">
            <ng-select
              [items]="roleWithUserGrantList"
              placeholder="Choose Role"
              notFoundText="No Role found"
              bindLabel="roleName"
              bindValue="roleNo"
              [(ngModel)]="selectedRoleNo"
              (change)="filterGrantRole()"
              class="form-select mb-2"
            >
            </ng-select>
          </div>
          <div class="col-md-12 accordionCustom">
            <accordion class="base-accordion">
              <accordion-group
                *ngFor="let roleGrant of grantRoleViewList; let i = index"
                [heading]="roleGrant['roleName']"
                [panelClass]="cardHeader"
                [isOpen]="false"
                [id]="roleGrant.id != null ? 'user_grant_role' : ''"
              >
                <span class="form-check form-check-inline subSpan">
                  <input
                    class="form-check-input"
                    type="checkbox"
                    id="cbCanGrant{{ roleGrant.roleNo }}"
                    [checked]="roleGrant.canGrant == 1 ? true : false"
                    (change)="getSelectedRoleValue(i, 'canGrant', $event)"
                  />
                  <label
                    class="form-check-label"
                    for="cbCanGrant{{ roleGrant.roleNo }}"
                    >Grant</label
                  >
                </span>

                <span class="form-check form-check-inline subSpan">
                  <input
                    class="form-check-input"
                    type="checkbox"
                    id="cbActive{{ roleGrant.roleNo }}"
                    [checked]="roleGrant.activeStatus == 1 ? true : false"
                    (change)="getSelectedRoleValue(i, 'activeStatus', $event)"
                  />
                  <label
                    class="form-check-label"
                    for="cbActive{{ roleGrant.roleNo }}"
                    >Active</label
                  >
                </span>

                <button
                  type="button"
                  class="btn btn-sm btn-outline-info mr-2"
                  (click)="loadRoleFeatures(roleGrant)"
                  [title]="'View features for ' + roleGrant.roleName"
                >
                  <i class="fas fa-list mr-1"></i>
                  <span *ngIf="!roleGrant.loadingFeatures"> View Features</span>
                </button>
              </accordion-group>
            </accordion>
          </div>
        </div>
      </div>
    </tab>
  </tabset>
</div>

<div class="modal-footer border-0 bg-light">
  <button
    type="button"
    class="btn btn-sm btn-light fw-medium close px-3 m-0 text-body-secondary"
    (click)="bsModalRef.hide()"
  >
    Close
  </button>

  <button
    type="button"
    class="btn btn-sm base-btn-primary fw-medium py-1 px-3 m-0 ms-3 fixed-width-btn"
    (click)="saveUpdateUser()"
    [disabled]="isSaving"
  >
    {{ isSaving ? "Saving" : "Save" }}
  </button>
</div>
