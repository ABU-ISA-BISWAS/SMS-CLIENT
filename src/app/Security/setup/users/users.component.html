<div class="container-fluid">
  <div class="card">
    <div class="card-header py-3">
      <h6 class="m-0 fw-bold base-txt-primary">User Setup</h6>
    </div>

    <div class="card-body">
      <!-- Action Bar -->
      <div class="card border border-2 action-bar mb-2">
        <div
          class="card-body d-flex flex-wrap gap-2 justify-content-xxl-end justify-content-end py-1 px-2"
        >
          <button
            type="button"
            class="btn btn-sm base-btn-outline-orange fw-medium px-3 mb-xxl-0"
            (click)="disableFG()"
          >
            <i class="fas fa-toggle-on mr-1" aria-hidden="true"></i>
            {{ disableButton }}
          </button>

          <button
            type="button"
            class="btn btn-sm base-btn-outline-purple fw-medium px-2 mb-xxl-0"
            (click)="changePassword()"
          >
            <i class="fas fa-exchange-alt mr-1" aria-hidden="true"></i> Change
            Password
          </button>

          <div class="vr"></div>

          <button
            type="button"
            class="btn btn-sm base-btn-primary fw-medium px-3 mb-xxl-0"
            (click)="addFG()"
          >
            <i class="fas fa-plus-circle" aria-hidden="true"></i> Add
          </button>

          <button
            type="button"
            class="btn btn-sm btn-warning fw-medium px-3 mb-xxl-0"
            (click)="editFG()"
          >
            <i class="fas fa-edit"></i> Edit
          </button>
          <!-- <button type="button" class="btn btn-sm btn-danger fw-medium px-2 mb-2 mb-xxl-0"
                        (click)="deleteFG()">
                        <i class="fas fa-trash-alt"></i> Delete
                    </button> -->
        </div>
      </div>

      <div class="card border border-2 bg-light mb-2">
        <div
          class="card-body d-flex flex-wrap gap-2 justify-content-end py-0 px-2"
        >
          <div class="row justify-content-center align-items-center">
            <div class="col mt-3 mt-xl-0">
              <div class="custom-radio-group d-flex flex-wrap">
                <div class="form-check">
                  <input
                    type="radio"
                    id="inlineRadio2"
                    name="inlineRadioOptions"
                    (click)="statusCheck('E')"
                    [(ngModel)]="enabledDisabledFlag"
                    class="custom-control-input"
                    value="E"
                  />
                  <label class="form-check-label p-2" for="inlineRadio2"
                    >Enabled</label
                  >
                </div>

                <div class="form-check">
                  <input
                    type="radio"
                    (click)="statusCheck('D')"
                    [(ngModel)]="enabledDisabledFlag"
                    id="inlineRadio3"
                    name="inlineRadioOptions"
                    class="custom-control-input"
                    value="D"
                  />
                  <label class="form-check-label p-2" for="inlineRadio3"
                    >Disabled</label
                  >
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>

      <div class="row">
        <div class="col-md-12">
          <div class="card mb-4">
            <div class="card-body">
              <div class="table-responsive">
                <table
                  #userGrid
