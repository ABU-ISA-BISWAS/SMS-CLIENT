<div class="container-fluid">
  <!-- ══════════════════════════════════════
       VIEW 1 — User List
  ═══════════════════════════════════════ -->
  <div [hidden]="isFlipped">
    <div class="card">
      <div
        class="card-header py-2 d-flex justify-content-between align-items-center"
      >
        <h6 class="m-0 fw-bold base-txt-primary">
          <i
            class="fas fa-users me-2"
            style="color: #4b8df8; font-size: 14px"
          ></i
          >User Setup
        </h6>
        <div class="d-flex flex-wrap gap-2 align-items-center">
          <button
            type="button"
            class="btn btn-sm base-btn-outline-orange fw-medium px-3"
            (click)="disableFG()"
          >
            <i class="fas fa-toggle-on me-1"></i>{{ disableButton }}
          </button>
          <button
            type="button"
            class="btn btn-sm base-btn-outline-purple fw-medium px-2"
            (click)="changePassword()"
          >
            <i class="fas fa-exchange-alt me-1"></i> Change Password
          </button>
          <div class="vr"></div>
          <button
            type="button"
            class="btn btn-sm base-btn-primary fw-medium px-3"
            (click)="addFG()"
          >
            <i class="fas fa-plus-circle me-1"></i> Add
          </button>
          <button
            type="button"
            class="btn btn-sm btn-warning fw-medium px-3"
            (click)="editFG()"
          >
            <i class="fas fa-edit me-1"></i> Edit
          </button>
        </div>
      </div>

      <div class="card-body">
        <!-- Filter -->
        <div class="card border border-2 mb-2 action-bar">
          <div
            class="card-body d-flex flex-wrap gap-2 justify-content-end py-0 px-2"
          >
            <div class="row justify-content-center align-items-center">
              <div class="col mt-3 mt-xl-0">
                <div class="custom-radio-group d-flex flex-wrap">
                  <div class="form-check">
                    <input
                      type="radio"
                      id="inlineRadio2"
                      name="inlineRadioOptions"
                      (click)="statusCheck('E')"
                      [(ngModel)]="enabledDisabledFlag"
                      class="custom-control-input"
                      value="E"
                    />
                    <label class="form-check-label p-2" for="inlineRadio2"
                      >Enabled</label
                    >
                  </div>
                  <div class="form-check">
                    <input
                      type="radio"
                      (click)="statusCheck('D')"
                      [(ngModel)]="enabledDisabledFlag"
                      id="inlineRadio3"
                      name="inlineRadioOptions"
                      class="custom-control-input"
                      value="D"
                    />
                    <label class="form-check-label p-2" for="inlineRadio3"
                      >Disabled</label
                    >
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>

        <!-- DataTable -->
        <div class="row">
          <div class="col-md-12">
            <div class="card mb-4">
              <div class="card-body">
                <div class="table-responsive">
                  <table
                    #userGrid
                    class="row-border hover table table-sm"
                  ></table>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- ══════════════════════════════════════
       VIEW 2 — Add / Edit User (inline)
  ═══════════════════════════════════════ -->
  <div [hidden]="!isFlipped">
    <div class="card border-0 shadow-sm">
      <!-- Form header with breadcrumb + save/cancel -->
      <div class="uf-back-header">
        <button type="button" class="uf-back-btn" (click)="closeForm()">
          <i class="fas fa-arrow-left"></i>
        </button>
        <div class="uf-back-breadcrumb">
          <span class="uf-bc-root" (click)="closeForm()">
            <i class="fas fa-users"></i> User Setup
          </span>
          <i class="fas fa-chevron-right uf-bc-sep"></i>
          <span class="uf-bc-current">{{ formTitle }}</span>
        </div>
        <div class="ms-auto d-flex gap-2">
          <button
            type="button"
            class="btn btn-sm btn-light border fw-medium px-3"
            style="font-size: 12px"
            (click)="closeForm()"
          >
            <i class="fas fa-times me-1"></i> Cancel
          </button>
          <button
            type="button"
            class="btn btn-sm fw-medium px-3"
            style="
              font-size: 12px;
              background: linear-gradient(135deg, #4b8df8, #7b61ff);
              color: #fff;
              border: none;
            "
            (click)="triggerSave()"
            [disabled]="isSavingForm"
          >
            <i class="fas fa-save me-1"></i>
            {{ isSavingForm ? "Saving…" : "Save" }}
          </button>
        </div>
      </div>

      <!-- Embedded AddUserComponent — only rendered while form is open -->
      <div class="uf-form-body" *ngIf="isFlipped">
        <app-add-user
          #addUserRef
          [selectedUser]="formSelectedUser"
          [receivedEmp]="formSelectedEmp"
          [title]="formTitle"
          [showPassword]="formShowPassword"
          (onSaveSuccess)="onFormSaved()"
          (onSavingChange)="isSavingForm = $event"
        ></app-add-user>
      </div>
    </div>
  </div>
</div>
