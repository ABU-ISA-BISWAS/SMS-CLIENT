<!-- Modal Header -->
<div class="modal-header border-0 pb-0">
  <div class="d-flex align-items-center gap-2">
    <div class="modal-header-icon">
      <i class="ti ti-school fs-16px" aria-hidden="true"></i>
    </div>
    <div>
      <h6 class="modal-title m-0 fw-bold base-txt-primary lh-1">{{ title }}</h6>
      <small class="text-body-secondary fs-11px">Manage academic class</small>
    </div>
  </div>
  <button
    type="button"
    class="modal-close-btn btn btn-sm btn-light border"
    aria-label="Close"
    (click)="bsModalRef.hide()"
  >
    <i class="ti ti-x fs-13px" aria-hidden="true"></i>
  </button>
</div>

<!-- Modal Body -->
<div class="modal-body pt-3 pb-2">
  <!-- Class Name -->
  <div class="field-group">
    <label class="field-label"
      >Class Name <span class="text-danger">*</span></label
    >
    <div class="input-field-wrapper">
      <i class="ti ti-book field-icon-left" aria-hidden="true"></i>
      <input
        type="text"
        class="form-control field-input"
        placeholder="Enter class name"
        [(ngModel)]="academicClass.className"
      />
    </div>
  </div>

  <!-- Class Code -->
  <div class="field-group">
    <label class="field-label"
      >Class Code <span class="text-danger">*</span></label
    >
    <div class="input-field-wrapper">
      <i class="ti ti-hash field-icon-left" aria-hidden="true"></i>
      <input
        type="text"
        class="form-control field-input"
        placeholder="Enter class code"
        [(ngModel)]="academicClass.classCode"
      />
    </div>
  </div>

  <!-- Class Order -->
  <div class="field-group">
    <label class="field-label"
      >Class Order <span class="text-danger">*</span></label
    >
    <div class="input-field-wrapper">
      <i
        class="ti ti-sort-ascending-numbers field-icon-left"
        aria-hidden="true"
      ></i>
      <input
        type="number"
        class="form-control field-input"
        placeholder="Enter class order"
        [(ngModel)]="academicClass.classOrder"
      />
    </div>
  </div>

  <!-- Status -->
  <div class="checkbox-row">
    <label class="checkbox-item">
      <input
        type="checkbox"
        [(ngModel)]="academicClass.activeStatus"
        class="checkbox-input"
      />
      <span class="checkbox-label">Active Status</span>
    </label>
  </div>
</div>

<!-- Modal Footer -->
<div class="modal-footer border-0 modal-footer-custom">
  <button
    type="button"
    class="btn btn-sm btn-light border fw-medium px-4 fixed-width-btn"
    (click)="bsModalRef.hide()"
  >
    Close
  </button>
  <button
    type="button"
    class="btn btn-sm base-btn-primary fw-medium px-4 fixed-width-btn"
    (click)="saveClasses()"
    [disabled]="isSaving"
  >
    <i
      *ngIf="isSaving"
      class="ti ti-loader-2 spin me-1 fs-13px"
      aria-hidden="true"
    ></i>
    {{ isSaving ? "Saving..." : "Save" }}
  </button>
</div>
