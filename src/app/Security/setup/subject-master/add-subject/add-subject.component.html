<!-- Modal Header -->
<div class="modal-header border-0 pb-0">
  <div class="d-flex align-items-center gap-2">
    <div class="modal-header-icon">
      <i class="ti ti-book fs-16px" aria-hidden="true"></i>
    </div>
    <div>
      <h6 class="modal-title m-0 fw-bold base-txt-primary lh-1">{{ title }}</h6>
      <small class="text-body-secondary fs-11px"
        >Manage subject information</small
      >
    </div>
  </div>
  <button
    type="button"
    class="modal-close-btn btn btn-sm btn-light border"
    aria-label="Close"
    (click)="bsModalRef.hide()"
  >
    <i class="ti ti-x fs-13px" aria-hidden="true"></i>
  </button>
</div>

<!-- Modal Body -->
<div class="modal-body pt-3 pb-2">
  <div class="subject-form-grid">
    <!-- Subject Code -->
    <div class="field-group">
      <label class="field-label"
        >Subject Code <span class="text-danger">*</span></label
      >
      <div class="input-field-wrapper">
        <i class="ti ti-hash field-icon-left" aria-hidden="true"></i>
        <input
          type="text"
          class="form-control field-input"
          placeholder="Enter subject code"
          [(ngModel)]="subject.subjectCode"
        />
      </div>
    </div>

    <!-- Sort Order -->
    <div class="field-group">
      <label class="field-label"
        >Sort Order <span class="text-danger">*</span></label
      >
      <div class="input-field-wrapper">
        <i
          class="ti ti-sort-ascending-numbers field-icon-left"
          aria-hidden="true"
        ></i>
        <input
          type="number"
          class="form-control field-input"
          placeholder="Enter sort order"
          [(ngModel)]="subject.sortOrder"
        />
      </div>
    </div>

    <!-- Subject Name -->
    <div class="field-group">
      <label class="field-label"
        >Subject Name <span class="text-danger">*</span></label
      >
      <div class="input-field-wrapper">
        <i class="ti ti-book field-icon-left" aria-hidden="true"></i>
        <input
          type="text"
          class="form-control field-input"
          placeholder="Enter subject name"
          [(ngModel)]="subject.subjectName"
        />
      </div>
    </div>

    <!-- Subject Name Bangla -->
    <div class="field-group">
      <label class="field-label"
        >Subject Name (Bangla) <span class="text-danger">*</span></label
      >
      <div class="input-field-wrapper">
        <i class="ti ti-language field-icon-left" aria-hidden="true"></i>
        <input
          type="text"
          class="form-control field-input"
          placeholder="বিষয়ের নাম"
          [(ngModel)]="subject.subjectNameBn"
        />
      </div>
    </div>

    <!-- Subject Type -->
    <div class="field-group">
      <label class="field-label"
        >Subject Type <span class="text-danger">*</span></label
      >
      <div class="input-field-wrapper">
        <i class="ti ti-tag field-icon-left" aria-hidden="true"></i>
        <select
          class="form-select field-select"
          [(ngModel)]="subject.subjectType"
          name="subjectType"
        >
          <option value="" disabled selected>Select type</option>
          <option value="COMPULSORY">COMPULSORY</option>
          <option value="OPTIONAL">OPTIONAL</option>
          <option value="PRACTICAL">PRACTICAL</option>
          <option value="VOCATIONAL">VOCATIONAL</option>
          <option value="ISLAMIC">ISLAMIC</option>
        </select>
      </div>
    </div>

    <!-- Subject Category -->
    <div class="field-group">
      <label class="field-label"
        >Subject Category <span class="text-danger">*</span></label
      >
      <div class="input-field-wrapper">
        <i class="ti ti-category field-icon-left" aria-hidden="true"></i>
        <select
          class="form-select field-select"
          [(ngModel)]="subject.subjectCategory"
          name="subjectCategory"
        >
          <option value="" disabled selected>Select category</option>
          <option value="THEORY">THEORY</option>
          <option value="PRACTICAL">PRACTICAL</option>
          <option value="MCQ">MCQ</option>
          <option value="BOTH">BOTH</option>
        </select>
      </div>
    </div>

    <!-- Full Marks -->
    <div class="field-group">
      <label class="field-label"
        >Full Marks <span class="text-danger">*</span></label
      >
      <div class="input-field-wrapper">
        <i class="ti ti-trophy field-icon-left" aria-hidden="true"></i>
        <input
          type="number"
          class="form-control field-input"
          placeholder="Enter full marks"
          [(ngModel)]="subject.fullMarks"
        />
      </div>
    </div>

    <!-- Pass Marks -->
    <div class="field-group">
      <label class="field-label"
        >Pass Marks <span class="text-danger">*</span></label
      >
      <div class="input-field-wrapper">
        <i class="ti ti-check field-icon-left" aria-hidden="true"></i>
        <input
          type="number"
          class="form-control field-input"
          placeholder="Enter pass marks"
          [(ngModel)]="subject.passMarks"
        />
      </div>
    </div>

    <!-- Credit Hour -->
    <div class="field-group">
      <label class="field-label"
        >Credit Hour <span class="text-danger">*</span></label
      >
      <div class="input-field-wrapper">
        <i class="ti ti-clock field-icon-left" aria-hidden="true"></i>
        <input
          type="number"
          class="form-control field-input"
          placeholder="Enter credit hour"
          [(ngModel)]="subject.creditHour"
        />
      </div>
    </div>

    <!-- Status -->
    <div class="field-group subject-col-full">
      <div class="checkbox-row">
        <label class="checkbox-item">
          <input
            type="checkbox"
            [(ngModel)]="subject.activeStatus"
            class="checkbox-input"
          />
          <span class="checkbox-label">Active Status</span>
        </label>
      </div>
    </div>
  </div>
</div>

<!-- Modal Footer -->
<div class="modal-footer border-0 modal-footer-custom">
  <button
    type="button"
    class="btn btn-sm btn-light border fw-medium px-4 fixed-width-btn"
    (click)="bsModalRef.hide()"
  >
    Close
  </button>
  <button
    type="button"
    class="btn btn-sm base-btn-primary fw-medium px-4 fixed-width-btn"
    (click)="saveSubjects()"
    [disabled]="isSaving"
  >
    <i
      *ngIf="isSaving"
      class="ti ti-loader-2 spin me-1 fs-13px"
      aria-hidden="true"
    ></i>
    {{ isSaving ? "Saving..." : "Save" }}
  </button>
</div>
