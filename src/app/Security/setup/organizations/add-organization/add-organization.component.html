<div class="modal-header">
  <h5 class="modal-title">{{title}}</h5>
  <button type="button" (click)="bsModalRef.hide()" class="close" data-dismiss="modal" aria-label="Close"> <span
      aria-hidden="true">&times;</span> </button>
</div>
<div class="modal-body persoanlInfoArea">
  <div class="form-group col-md-12 row mx-auto">
    <div class="col-md-4 text-right">
      <label>Org. Name: </label>
    </div>
    <div class="col-md-6">
      <input type="text" class="form-control" [(ngModel)]="orgData.ogName">
    </div>
  </div>
  <div class="form-group col-md-12 row mx-auto">
    <div class="col-md-4 text-right">
      <label>Phone No: </label>
    </div>
    <div class="col-md-6">
      <input type="text" class="form-control" [(ngModel)]="orgData.ogPhone">
    </div>
  </div>
  <div class="form-group col-md-12 row mx-auto">
    <div class="col-md-4 text-right">
      <label>Address: </label>
    </div>
    <div class="col-md-6">
      <textarea name="" class="form-control" [(ngModel)]="orgData.ogAddress"></textarea>
    </div>
  </div>
</div>
<div class="modal-footer">
  <button type="button" class="btn btn-primary" (click)="addEditOrganization()">Save</button>
  <button type="button" (click)="bsModalRef.hide()" class="btn btn-danger" data-dismiss="modal">Close</button>
</div>
