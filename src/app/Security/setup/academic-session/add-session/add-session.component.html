<!-- Modal Header -->
<div class="modal-header border-0 pb-0">
  <div class="d-flex align-items-center gap-2">
    <div class="modal-header-icon">
      <i class="ti ti-calendar-event fs-16px" aria-hidden="true"></i>
    </div>
    <div>
      <h6 class="modal-title m-0 fw-bold base-txt-primary lh-1">{{ title }}</h6>
      <small class="text-body-secondary fs-11px">Manage academic session</small>
    </div>
  </div>
  <button
    type="button"
    class="modal-close-btn btn btn-sm btn-light border"
    aria-label="Close"
    (click)="bsModalRef.hide()"
  >
    <i class="ti ti-x fs-13px" aria-hidden="true"></i>
  </button>
</div>

<!-- Modal Body -->
<div class="modal-body pt-3 pb-2">
  <!-- Session Name -->
  <div class="field-group">
    <label class="field-label"
      >Session Name <span class="text-danger">*</span></label
    >
    <div class="input-field-wrapper">
      <i class="ti ti-calendar field-icon-left" aria-hidden="true"></i>
      <input
        type="text"
        class="form-control field-input"
        placeholder="Enter session name"
        [(ngModel)]="academicSession.sessionName"
      />
    </div>
  </div>

  <!-- Remarks -->
  <div class="field-group">
    <label class="field-label"
      >Remarks <span class="text-danger">*</span></label
    >
    <div class="input-field-wrapper">
      <i class="ti ti-notes field-icon-left" aria-hidden="true"></i>
      <input
        type="text"
        class="form-control field-input"
        placeholder="Enter remarks"
        [(ngModel)]="academicSession.remarks"
      />
    </div>
  </div>

  <!-- Start Date -->
  <div class="field-group">
    <label class="field-label">Start Date</label>
    <div class="input-field-wrapper">
      <i class="ti ti-calendar-plus field-icon-left" aria-hidden="true"></i>
      <input
        type="text"
        class="form-control field-input"
        placeholder="Select year"
        bsDatepicker
        [bsConfig]="{
          minMode: 'year',
          dateInputFormat: 'YYYY',
          containerClass: 'brand-theme',
        }"
        [ngModel]="academicSession.startDate"
        (ngModelChange)="onStartYearModelChange($event)"
      />
    </div>
  </div>

  <!-- End Date -->
  <div class="field-group">
    <label class="field-label">End Date</label>
    <div class="input-field-wrapper">
      <i class="ti ti-calendar-minus field-icon-left" aria-hidden="true"></i>
      <input
        type="text"
        class="form-control field-input"
        placeholder="Select year"
        bsDatepicker
        [bsConfig]="{
          minMode: 'year',
          dateInputFormat: 'YYYY',
          containerClass: 'brand-theme',
        }"
        [ngModel]="academicSession.endDate"
        (ngModelChange)="onEndYearModelChange($event)"
      />
    </div>
  </div>

  <!-- Status -->
  <div class="checkbox-row">
    <label class="checkbox-item">
      <input
        type="checkbox"
        [(ngModel)]="academicSession.activeStatus"
        class="checkbox-input"
      />
      <span class="checkbox-label">Active Status</span>
    </label>
  </div>
</div>

<!-- Modal Footer -->
<div class="modal-footer border-0 modal-footer-custom">
  <button
    type="button"
    class="btn btn-sm btn-light border fw-medium px-4 fixed-width-btn"
    (click)="bsModalRef.hide()"
  >
    Close
  </button>
  <button
    type="button"
    class="btn btn-sm base-btn-primary fw-medium px-4 fixed-width-btn"
    (click)="saveSessions()"
    [disabled]="isSaving"
  >
    <i
      *ngIf="isSaving"
      class="ti ti-loader-2 spin me-1 fs-13px"
      aria-hidden="true"
    ></i>
    {{ isSaving ? "Saving..." : "Save" }}
  </button>
</div>
