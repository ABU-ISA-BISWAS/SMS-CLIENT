<!-- Modal Header -->
<div class="modal-header border-0 pb-0">
  <div class="d-flex align-items-center gap-2">
    <div class="modal-header-icon">
      <i class="ti ti-message-code fs-16px" aria-hidden="true"></i>
    </div>
    <div>
      <h6 class="modal-title m-0 fw-bold base-txt-primary lh-1">{{ title }}</h6>
      <small class="text-body-secondary fs-11px">Manage SMS template</small>
    </div>
  </div>
  <button
    type="button"
    class="modal-close-btn btn btn-sm btn-light border"
    aria-label="Close"
    (click)="bsModalRef.hide()"
  >
    <i class="ti ti-x fs-13px" aria-hidden="true"></i>
  </button>
</div>

<!-- Modal Body -->
<div class="modal-body pt-3 pb-2">
  <div class="template-form-grid">
    <!-- Template Code -->
    <div class="field-group">
      <label class="field-label"
        >Template Code <span class="text-danger">*</span></label
      >
      <div class="input-field-wrapper">
        <i class="ti ti-hash field-icon-left" aria-hidden="true"></i>
        <input
          type="text"
          class="form-control field-input"
          placeholder="e.g. FEE_DUE"
          [(ngModel)]="template.templateCode"
          [disabled]="!!template.id"
        />
      </div>
    </div>

    <!-- Template Type -->
    <div class="field-group">
      <label class="field-label"
        >Template Type <span class="text-danger">*</span></label
      >
      <div class="input-field-wrapper">
        <i class="ti ti-tag field-icon-left" aria-hidden="true"></i>
        <select
          class="form-select field-select"
          [(ngModel)]="template.templateType"
        >
          <option [ngValue]="undefined">-- Select Type --</option>
          <option *ngFor="let t of templateTypes" [value]="t.value">
            {{ t.label }}
          </option>
        </select>
      </div>
    </div>

    <!-- Template Name -->
    <div class="field-group template-col-full">
      <label class="field-label"
        >Template Name <span class="text-danger">*</span></label
      >
      <div class="input-field-wrapper">
        <i class="ti ti-forms field-icon-left" aria-hidden="true"></i>
        <input
          type="text"
          class="form-control field-input"
          placeholder="Enter template name"
          [(ngModel)]="template.templateName"
        />
      </div>
    </div>

    <!-- Placeholders -->
    <div class="field-group template-col-full">
      <label class="field-label">Available Placeholders</label>
      <div class="placeholder-chip-area">
        <span
          *ngFor="let ph of availablePlaceholders"
          class="placeholder-chip"
          (click)="insertPlaceholder(ph)"
        >
          {{ ph }}
        </span>
      </div>
    </div>

    <!-- Template Body -->
    <div class="field-group template-col-full">
      <label class="field-label"
        >Template Body <span class="text-danger">*</span></label
      >
      <textarea
        class="form-control field-textarea"
        [(ngModel)]="template.templateBody"
        rows="1"
        maxlength="500"
        placeholder="Type message here or click placeholders above..."
      ></textarea>
      <div class="d-flex justify-content-end mt-1">
        <small
          [class.text-danger]="charCount > 450"
          [class.text-body-secondary]="charCount <= 450"
          style="font-size: 11px"
        >
          {{ charCount }} / 500 characters
        </small>
      </div>
    </div>

    <!-- Template Body Bangla -->
    <div class="field-group template-col-full">
      <label class="field-label">Body (Bangla)</label>
      <textarea
        class="form-control field-textarea"
        [(ngModel)]="template.templateBodyBn"
        rows="1"
        maxlength="500"
        placeholder="বাংলায় SMS টেমপ্লেট (ঐচ্ছিক)"
      ></textarea>
    </div>

    <!-- Status -->
    <div class="field-group template-col-full">
      <div class="checkbox-row">
        <label class="checkbox-item">
          <input
            type="checkbox"
            [(ngModel)]="template.activeStatus"
            class="checkbox-input"
          />
          <span class="checkbox-label">Active Status</span>
        </label>
      </div>
    </div>
  </div>
</div>

<!-- Modal Footer -->
<div class="modal-footer border-0 modal-footer-custom">
  <button
    type="button"
    class="btn btn-sm btn-light border fw-medium px-4 fixed-width-btn"
    (click)="bsModalRef.hide()"
  >
    Close
  </button>
  <button
    type="button"
    class="btn btn-sm base-btn-primary fw-medium px-4 fixed-width-btn"
    (click)="saveTemplate()"
    [disabled]="isSaving"
  >
    <i
      *ngIf="isSaving"
      class="ti ti-loader-2 spin me-1 fs-13px"
      aria-hidden="true"
    ></i>
    {{ isSaving ? "Saving..." : "Save" }}
  </button>
</div>
