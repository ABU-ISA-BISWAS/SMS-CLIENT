<div class="modal-header border-0">
  <h6 class="modal-title m-0 fw-bold base-txt-primary">{{ title }}</h6>
  <button
    type="button"
    class="btn-close close pull-right fs-13px btn btn-sm btn-light"
    aria-label="Close"
    (click)="bsModalRef.hide()"
  >
    <span aria-hidden="true" class="visually-hidden">&times;</span>
  </button>
</div>

<div class="modal-body">
  <div class="border p-3 mb-3">
    <!-- Template Code -->
    <div class="input-group required mb-2 positionRelative">
      <span class="input-group-text base-bg-subtle-primary base-txt-primary">
        Template Code <span class="text-danger">*</span>
      </span>
      <input
        type="text"
        class="form-control"
        [(ngModel)]="template.templateCode"
        placeholder="e.g. FEE_DUE"
        [disabled]="!!template.id"
      />
    </div>

    <!-- Template Name -->
    <div class="input-group required mb-2 positionRelative">
      <span class="input-group-text base-bg-subtle-primary base-txt-primary">
        Template Name <span class="text-danger">*</span>
      </span>
      <input
        type="text"
        class="form-control"
        [(ngModel)]="template.templateName"
      />
    </div>

    <!-- Template Type -->
    <div class="input-group required mb-2 positionRelative">
      <span class="input-group-text base-bg-subtle-primary base-txt-primary">
        Template Type <span class="text-danger">*</span>
      </span>
      <select class="form-select" [(ngModel)]="template.templateType">
        <option [ngValue]="undefined">-- Select Type --</option>
        <option *ngFor="let t of templateTypes" [value]="t.value">
          {{ t.label }}
        </option>
      </select>
    </div>

    <!-- Placeholders -->
    <div class="mb-2">
      <small class="text-muted fw-semibold d-block mb-1">
        Available Placeholders (click to insert):
      </small>
      <div class="d-flex flex-wrap gap-1">
        <span
          *ngFor="let ph of availablePlaceholders"
          class="badge bg-secondary-subtle text-secondary border px-2 py-1"
          style="cursor: pointer; font-size: 11px"
          (click)="insertPlaceholder(ph)"
        >
          {{ ph }}
        </span>
      </div>
    </div>

    <!-- Template Body -->
    <div class="mb-2 positionRelative">
      <div class="input-group align-items-start">
        <span
          class="input-group-text base-bg-subtle-primary base-txt-primary"
          style="align-self: flex-start; padding-top: 8px"
        >
          Template Body <span class="text-danger">*</span>
        </span>
        <textarea
          class="form-control"
          [(ngModel)]="template.templateBody"
          rows="4"
          maxlength="500"
          placeholder="Type message here or click placeholders above..."
        >
        </textarea>
      </div>
      <div class="text-end mt-1">
        <small
          [class.text-danger]="charCount > 450"
          [class.text-muted]="charCount <= 450"
        >
          {{ charCount }} / 500 characters
        </small>
      </div>
    </div>

    <!-- Template Body Bangla -->
    <div class="mb-2 positionRelative">
      <div class="input-group align-items-start">
        <span
          class="input-group-text base-bg-subtle-primary base-txt-primary"
          style="align-self: flex-start; padding-top: 8px"
        >
          Body (Bangla)
        </span>
        <textarea
          class="form-control"
          [(ngModel)]="template.templateBodyBn"
          rows="3"
          maxlength="500"
          placeholder="বাংলায় SMS টেমপ্লেট (ঐচ্ছিক)"
        >
        </textarea>
      </div>
    </div>

    <!-- Status -->
    <div class="row mt-2">
      <div class="col-12 d-flex justify-content-end">
        <div class="form-check flex-nowrap">
          <label class="form-check-label text-dark text-nowrap ms-1"
            >Status</label
          >
          <input
            type="checkbox"
            [(ngModel)]="template.activeStatus"
            class="form-check-input"
          />
        </div>
      </div>
    </div>
  </div>
</div>

<div class="modal-footer border-0 bg-light">
  <button
    type="button"
    class="btn btn-sm btn-light fw-medium close px-3 m-0 text-body-secondary fixed-width-btn"
    (click)="bsModalRef.hide()"
  >
    Close
  </button>
  <button
    type="button"
    class="btn btn-sm base-btn-primary fw-medium py-1 px-3 m-0 ms-3 fixed-width-btn"
    (click)="saveTemplate()"
    [disabled]="isSaving"
  >
    {{ isSaving ? "Saving..." : "Save" }}
  </button>
</div>
