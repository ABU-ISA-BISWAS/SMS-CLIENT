<div class="container-fluid">
  <div class="card">
    <div class="card-header py-3">
      <h6 class="m-0 fw-bold base-txt-primary">Department Setup</h6>
    </div>

    <div class="card-body">
      <!-- Action Bar -->
      <div class="card border border-2 action-bar mb-2">
        <div
          class="card-body d-flex flex-wrap gap-2 justify-content-xxl-end justify-content-end py-1 px-3"
        >
          <button
            type="button"
            class="btn btn-sm base-btn-primary fw-medium px-3 mb-xxl-0"
            (click)="addDepartment()"
            title="Add Class"
          >
            <i class="fas fa-user-plus" aria-hidden="true"></i> Add
          </button>

          <button
            type="button"
            class="btn btn-sm btn-warning fw-medium px-3 mb-xxl-0"
            (click)="editDepartment()"
            title="Add Bank Info"
          >
            <i class="fas fa-edit" aria-hidden="true"></i> Edit
          </button>
          <button
            type="button"
            class="btn btn-sm btn-danger fw-medium px-3 mb-xxl-0"
            (click)="deleteDepartment()"
          >
            <i class="fas fa-trash-alt"></i> Delete
          </button>
        </div>
      </div>

      <div class="row">
        <div class="col-md-12">
          <div class="card mb-4">
            <div class="card-body">
              <div class="table-responsive">
                <table
                  #departmentGridTable
                  class="row-border hover table table-sm"
                ></table>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
