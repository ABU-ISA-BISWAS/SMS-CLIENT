<!-- Modal Header -->
<div class="modal-header border-0 pb-0">
  <div class="d-flex align-items-center gap-2">
    <div class="modal-header-icon">
      <i class="ti ti-puzzle fs-16px" aria-hidden="true"></i>
    </div>
    <div>
      <h6 class="modal-title m-0 fw-bold base-txt-primary lh-1">{{ title }}</h6>
      <small class="text-body-secondary fs-11px">Manage system feature</small>
    </div>
  </div>
  <button
    type="button"
    class="modal-close-btn btn btn-sm btn-light border"
    aria-label="Close"
    (click)="bsModalRef.hide()"
  >
    <i class="ti ti-x fs-13px" aria-hidden="true"></i>
  </button>
</div>

<!-- Modal Body -->
<div class="modal-body pt-3 pb-2">
  <div class="feature-form-grid">
    <!-- Feature Name -->
    <div class="field-group field-group--full">
      <label class="field-label"
        >Feature Name <span class="text-danger">*</span></label
      >
      <div class="input-field-wrapper">
        <i class="ti ti-forms field-icon-left" aria-hidden="true"></i>
        <input
          type="text"
          class="form-control field-input"
          placeholder="Enter feature name"
          [(ngModel)]="feature.submenuName"
        />
      </div>
    </div>

    <!-- Feature Type -->
    <div class="field-group">
      <label class="field-label"
        >Feature Type <span class="text-danger">*</span></label
      >
      <div class="input-field-wrapper">
        <i class="ti ti-tag field-icon-left" aria-hidden="true"></i>
        <ng-select
          [(ngModel)]="feature.submenuType"
          placeholder="Select feature type"
          class="ng-select-custom"
        >
          <ng-option [value]="'R'">Report</ng-option>
          <ng-option [value]="'F'">Form</ng-option>
          <ng-option [value]="'W'">Java Form</ng-option>
          <ng-option [value]="'A'">Access</ng-option>
          <ng-option [value]="'P'">Parameter Form</ng-option>
        </ng-select>
      </div>
    </div>

    <!-- Serial No -->
    <div class="field-group">
      <label class="field-label"
        >Serial No <span class="text-danger">*</span></label
      >
      <div class="input-field-wrapper">
        <i class="ti ti-list-numbers field-icon-left" aria-hidden="true"></i>
        <input
          type="number"
          class="form-control field-input"
          placeholder="Enter serial number"
          [(ngModel)]="feature.slNo"
        />
      </div>
    </div>

    <!-- Feature Code -->
    <div class="field-group">
      <label class="field-label"
        >Feature Code <span class="text-danger">*</span></label
      >
      <div class="input-field-wrapper">
        <i class="ti ti-code field-icon-left" aria-hidden="true"></i>
        <input
          type="text"
          class="form-control field-input"
          placeholder="Enter feature code"
          [(ngModel)]="feature.submenuId"
          [ngClass]="{ 'is-invalid': validate }"
          (ngModelChange)="validate = false"
          (blur)="validateFeatureCode()"
        />
      </div>
      <div *ngIf="validate" class="field-error">
        <i class="ti ti-alert-circle fs-12px" aria-hidden="true"></i>
        Feature code already exists!
      </div>
    </div>

    <!-- Feature Page Link -->
    <div class="field-group">
      <label class="field-label"
        >Feature Page Link <span class="text-danger">*</span></label
      >
      <div class="input-field-wrapper">
        <i class="ti ti-link field-icon-left" aria-hidden="true"></i>
        <input
          type="text"
          class="form-control field-input"
          placeholder="Enter page link"
          [(ngModel)]="feature.pageLink"
        />
      </div>
    </div>

    <!-- Parent Module -->
    <div class="field-group field-group--full">
      <label class="field-label"
        >Parent Module <span class="text-danger">*</span></label
      >
      <div class="input-field-wrapper">
        <i class="ti ti-hierarchy field-icon-left" aria-hidden="true"></i>
        <ng-select
          [items]="parentModuleList"
          placeholder="Select parent module"
          notFoundText="No module found"
          bindLabel="moduleNameAndId"
          [(ngModel)]="feature.menuEntity"
          class="ng-select-custom"
        ></ng-select>
      </div>
    </div>

    <!-- Feature Icon -->
    <div class="field-group field-group--full">
      <label class="field-label">Feature Icon</label>
      <div class="input-field-wrapper">
        <i class="ti ti-icons field-icon-left" aria-hidden="true"></i>
        <div class="field-input-group">
          <input
            type="text"
            class="form-control field-input"
            placeholder="Enter icon class"
            [(ngModel)]="feature.iconName"
          />
          <button
            class="btn btn-sm base-btn-primary field-append-btn"
            (click)="selectIcon()"
            type="button"
          >
            <i class="ti ti-plus fs-13px" aria-hidden="true"></i> Pick
          </button>
        </div>
      </div>
    </div>

    <!-- Checkboxes -->
    <div class="field-group field-group--full">
      <div class="checkbox-row">
        <label class="checkbox-item">
          <input
            type="checkbox"
            [(ngModel)]="feature.hideFlag"
            class="checkbox-input"
          />
          <span class="checkbox-label">Hide Flag</span>
        </label>
        <label class="checkbox-item">
          <input
            type="checkbox"
            [(ngModel)]="feature.activeStatus"
            class="checkbox-input"
          />
          <span class="checkbox-label">Active Status</span>
        </label>
      </div>
    </div>
  </div>
</div>

<!-- Modal Footer -->
<div class="modal-footer border-0 modal-footer-custom">
  <button
    type="button"
    class="btn btn-sm btn-light border fw-medium px-4 fixed-width-btn"
    (click)="bsModalRef.hide()"
  >
    Close
  </button>
  <button
    type="button"
    class="btn btn-sm base-btn-primary fw-medium px-4 fixed-width-btn"
    (click)="saveFeatures()"
    [disabled]="isSaving"
  >
    <i
      *ngIf="isSaving"
      class="ti ti-loader-2 spin me-1 fs-13px"
      aria-hidden="true"
    ></i>
    {{ isSaving ? "Saving..." : "Save" }}
  </button>
</div>
