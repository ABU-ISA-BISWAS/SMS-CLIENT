<!-- Modal Header -->
<div class="modal-header border-0 pb-0">
  <div class="d-flex align-items-center gap-2">
    <div class="modal-header-icon">
      <i class="ti ti-building-bank fs-16px" aria-hidden="true"></i>
    </div>
    <div>
      <h6 class="modal-title m-0 fw-bold base-txt-primary lh-1">{{ title }}</h6>
      <small class="text-body-secondary fs-11px"
        >Manage bank account details</small
      >
    </div>
  </div>
  <button
    type="button"
    class="modal-close-btn btn btn-sm btn-light border"
    aria-label="Close"
    (click)="bsModalRef.hide()"
  >
    <i class="ti ti-x fs-13px" aria-hidden="true"></i>
  </button>
</div>

<!-- Modal Body -->
<div class="modal-body pt-3 pb-2">
  <div class="bank-form-grid">
    <!-- Bank Name -->
    <div class="field-group">
      <label class="field-label"
        >Bank Name <span class="text-danger">*</span></label
      >
      <div class="input-field-wrapper">
        <i class="ti ti-building-bank field-icon-left" aria-hidden="true"></i>
        <input
          type="text"
          class="form-control field-input"
          placeholder="Enter bank name"
          [(ngModel)]="bankInfoModel.bankName"
          name="bankName"
        />
      </div>
    </div>

    <!-- Bank Account Name -->
    <div class="field-group">
      <label class="field-label"
        >Account Holder Name <span class="text-danger">*</span></label
      >
      <div class="input-field-wrapper">
        <i class="ti ti-user field-icon-left" aria-hidden="true"></i>
        <input
          type="text"
          class="form-control field-input"
          placeholder="Enter account holder name"
          [(ngModel)]="bankInfoModel.bankAccountName"
          name="bankAccountName"
        />
      </div>
    </div>

    <!-- Bank Account No -->
    <div class="field-group">
      <label class="field-label"
        >Account No <span class="text-danger">*</span></label
      >
      <div class="input-field-wrapper">
        <i class="ti ti-credit-card field-icon-left" aria-hidden="true"></i>
        <input
          type="text"
          class="form-control field-input"
          placeholder="Enter account number"
          [(ngModel)]="bankInfoModel.bankAccountNo"
          name="bankAccountNo"
        />
      </div>
    </div>

    <!-- Bank Account Type -->
    <div class="field-group">
      <label class="field-label"
        >Account Type <span class="text-danger">*</span></label
      >
      <div class="input-field-wrapper">
        <i class="ti ti-category field-icon-left" aria-hidden="true"></i>
        <ng-select
          [items]="bankAccTypeList"
          bindLabel="name"
          bindValue="shortName"
          placeholder="Choose account type"
          notFoundText="No type found"
          [(ngModel)]="bankInfoModel.bankAccountType"
          name="bankAccountType"
          class="ng-select-custom"
        ></ng-select>
      </div>
    </div>

    <!-- Bank Branch -->
    <div class="field-group">
      <label class="field-label"
        >Bank Branch <span class="text-danger">*</span></label
      >
      <div class="input-field-wrapper">
        <i class="ti ti-map-pin field-icon-left" aria-hidden="true"></i>
        <input
          type="text"
          class="form-control field-input"
          placeholder="Enter branch name"
          [(ngModel)]="bankInfoModel.bankBranch"
          name="bankBranch"
        />
      </div>
    </div>

    <!-- Swift Code -->
    <div class="field-group">
      <label class="field-label"
        >Swift Code <span class="text-danger">*</span></label
      >
      <div class="input-field-wrapper">
        <i class="ti ti-world field-icon-left" aria-hidden="true"></i>
        <input
          type="number"
          class="form-control field-input"
          placeholder="Enter SWIFT code"
          [(ngModel)]="bankInfoModel.bankAccountSwiftcode"
          name="bankAccountSwiftcode"
        />
      </div>
    </div>

    <!-- Status -->
    <div class="field-group field-group--full">
      <div class="checkbox-row">
        <label class="checkbox-item">
          <input
            type="checkbox"
            [(ngModel)]="bankInfoModel.activeStatus"
            name="activeStatus"
            (ngModelChange)="bankInfoModel.activeStatus = $event ? 1 : 0"
            class="checkbox-input"
          />
          <span class="checkbox-label">Active Status</span>
        </label>
      </div>
    </div>
  </div>
</div>

<!-- Modal Footer -->
<div class="modal-footer border-0 modal-footer-custom">
  <button
    type="button"
    class="btn btn-sm btn-light border fw-medium px-4 fixed-width-btn"
    (click)="bsModalRef.hide()"
  >
    Close
  </button>
  <button
    type="button"
    class="btn btn-sm base-btn-primary fw-medium px-4 fixed-width-btn"
    (click)="saveBankInfo()"
  >
    Save
  </button>
</div>
