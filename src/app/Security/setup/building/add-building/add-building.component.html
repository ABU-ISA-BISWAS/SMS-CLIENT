<!-- Modal Header -->
<div class="modal-header border-0 pb-0">
  <div class="d-flex align-items-center gap-2">
    <div class="modal-header-icon">
      <i class="ti ti-building fs-16px" aria-hidden="true"></i>
    </div>
    <div>
      <h6 class="modal-title m-0 fw-bold base-txt-primary lh-1">{{ title }}</h6>
      <small class="text-body-secondary fs-11px"
        >Manage building information</small
      >
    </div>
  </div>
  <button
    type="button"
    class="modal-close-btn btn btn-sm btn-light border"
    aria-label="Close"
    (click)="bsModalRef.hide()"
  >
    <i class="ti ti-x fs-13px" aria-hidden="true"></i>
  </button>
</div>

<!-- Modal Body -->
<div class="modal-body pt-3 pb-2">
  <div class="building-form-grid">
    <!-- Building Code -->
    <div class="field-group">
      <label class="field-label"
        >Building Code <span class="text-danger">*</span></label
      >
      <div class="input-field-wrapper">
        <i class="ti ti-hash field-icon-left" aria-hidden="true"></i>
        <input
          type="text"
          class="form-control field-input"
          placeholder="e.g. MAIN"
          [(ngModel)]="building.buildingCode"
          [disabled]="!!building.id"
        />
      </div>
    </div>

    <!-- Total Floor -->
    <div class="field-group">
      <label class="field-label">Total Floor</label>
      <div class="input-field-wrapper">
        <i class="ti ti-stairs field-icon-left" aria-hidden="true"></i>
        <input
          type="number"
          class="form-control field-input"
          placeholder="e.g. 5"
          [(ngModel)]="building.totalFloor"
          min="1"
          max="20"
        />
      </div>
    </div>

    <!-- Building Name -->
    <div class="field-group">
      <label class="field-label"
        >Building Name <span class="text-danger">*</span></label
      >
      <div class="input-field-wrapper">
        <i class="ti ti-building field-icon-left" aria-hidden="true"></i>
        <input
          type="text"
          class="form-control field-input"
          placeholder="Enter building name"
          [(ngModel)]="building.buildingName"
        />
      </div>
    </div>

    <!-- Building Name Bangla -->
    <div class="field-group">
      <label class="field-label">নাম (বাংলায়)</label>
      <div class="input-field-wrapper">
        <i class="ti ti-language field-icon-left" aria-hidden="true"></i>
        <input
          type="text"
          class="form-control field-input"
          placeholder="ভবনের নাম বাংলায়"
          [(ngModel)]="building.buildingNameBn"
        />
      </div>
    </div>

    <!-- Status -->
    <div class="field-group building-col-full">
      <div class="checkbox-row">
        <label class="checkbox-item">
          <input
            type="checkbox"
            [(ngModel)]="building.activeStatus"
            class="checkbox-input"
          />
          <span class="checkbox-label">Active Status</span>
        </label>
      </div>
    </div>
  </div>
</div>

<!-- Modal Footer -->
<div class="modal-footer border-0 modal-footer-custom">
  <button
    type="button"
    class="btn btn-sm btn-light border fw-medium px-4 fixed-width-btn"
    (click)="bsModalRef.hide()"
  >
    Close
  </button>
  <button
    type="button"
    class="btn btn-sm base-btn-primary fw-medium px-4 fixed-width-btn"
    (click)="saveBuilding()"
    [disabled]="isSaving"
  >
    <i
      *ngIf="isSaving"
      class="ti ti-loader-2 spin me-1 fs-13px"
      aria-hidden="true"
    ></i>
    {{ isSaving ? "Saving..." : "Save" }}
  </button>
</div>
