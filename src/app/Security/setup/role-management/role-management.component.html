<div class="container-fluid">
  <div class="card">
    <div class="card-header py-3">
      <h6 class="m-0 fw-bold base-txt-primary">Role Setup</h6>
    </div>

    <div class="card-body">
      <!-- Action Bar -->

      <div class="card border border-2 filter-bar mb-2">
        <div class="card-body">
          <div class="row justify-content-center align-items-center">
            <div class="col-xl-12 col-lg-12 col-12">
              <div class="row g-2">
                <div class="col-md-6 col-xl-3 col-xxl-3">
                  <div class="input-group">
                    <span class="input-group-text base-txt-primary"
                      >Role Id:</span
                    >
                    <div class="form-control base-bg-subtle-primary px-2">
                      {{ roleViewObj.roleId || "&nbsp;" }}
                    </div>
                  </div>
                </div>

                <div class="col-md-6 col-xl-3 col-xxl-3">
                  <div class="input-group">
                    <span class="input-group-text base-txt-primary"
                      >Role Name:</span
                    >
                    <div class="form-control base-bg-subtle-primary px-2">
                      {{ roleViewObj.roleName || "&nbsp;" }}
                    </div>
                  </div>
                </div>

                <div class="col-md-6 col-xl-3 col-xxl-3">
                  <div class="info-value mt-1 px-2">
                    <button
                      type="button"
                      class="status-btn"
                      [ngClass]="
                        roleViewObj.activeStat === 1
                          ? 'status-active'
                          : 'status-inactive'
                      "
                      disabled
                    >
                      <span class="dot"></span>
                      {{ roleViewObj.activeStat === 1 ? "Active" : "Inactive" }}
                    </button>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- Action Bar -->
      <div class="card border border-2 action-bar mb-2">
        <div
          class="card-body d-flex flex-wrap gap-2 justify-content-xxl-end justify-content-end py-1 px-3"
        >
          <button
            type="button"
            class="btn btn-sm base-btn-outline-orange fw-medium px-2 mb-xxl-0"
            (click)="activeInactive()"
          >
            <i class="fas fa-toggle-on mr-1" aria-hidden="true"></i>&nbsp;{{
              disableButton
            }}
          </button>

          <button
            type="button"
            class="btn btn-sm base-btn-primary fw-medium px-3 mb-xxl-0"
            (click)="addRole()"
          >
            <i class="fas fa-user-plus mr-1" aria-hidden="true"></i> Add
          </button>

          <button
            type="button"
            class="btn btn-sm btn-warning fw-medium px-3 mb-xxl-0"
            (click)="editRole()"
          >
            <i class="fas fa-edit" aria-hidden="true"></i> Edit
          </button>

          <!-- <button type="button" class="btn btn-sm btn-danger fw-medium px-2 mb-2 mb-xxl-0" (click)="onDeleteModal()">
            <i class="fas fa-trash-alt"></i> Delete
          </button> -->
        </div>
      </div>

      <!-- Filtar Bar -->
      <div class="card border border-2 filter-bar mb-2 bg-light">
        <div
          class="card-body d-flex flex-wrap gap-2 justify-content-xxl-end justify-content-end py-0 px-2"
        >
          <div class="row justify-content-center align-items-center">
            <div class="mt-3 mt-xl-0">
              <div class="custom-radio-group d-flex flex-wrap">
                <div class="form-check">
                  <input
                    type="radio"
                    value="all"
                    id="inlineRadi1"
                    name="item"
                    [(ngModel)]="activeStatus"
                    (ngModelChange)="onChangeRadioButton()"
                    value=""
                    checked
                    class="custom-control-input"
                    checked
                  />
                  <label class="form-check-label p-2" for="inlineRadi1"
                    >All</label
                  >
                </div>

                <div class="form-check">
                  <input
                    type="radio"
                    value="all"
                    name="roleStatus"
                    id="inlineRadi2"
                    [(ngModel)]="activeStatus"
                    (ngModelChange)="onChangeRadioButton()"
                    value="1"
                    class="custom-control-input"
                  />
                  <label class="form-check-label p-2" for="inlineRadi2"
                    >Active</label
                  >
                </div>

                <div class="form-check">
                  <input
                    type="radio"
                    value="all"
                    [(ngModel)]="activeStatus"
                    (ngModelChange)="onChangeRadioButton()"
                    value="0"
                    id="inlineRadi3"
                    name="roleStatus"
                    class="custom-control-input"
                  />
                  <label class="form-check-label p-2" for="inlineRadi3"
                    >InActive</label
                  >
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>

      <div class="row">
        <div class="col-md-12">
          <div class="card mb-4">
            <div class="card-body">
              <div class="table-responsive">
                <table
                  #roleGrid
                  class="row-border hover table table-sm"
                ></table>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
