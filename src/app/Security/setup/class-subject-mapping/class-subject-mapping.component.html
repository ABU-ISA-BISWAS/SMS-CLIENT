<div class="container-fluid">
  <div class="card">
    <div
      class="card-header py-2 d-flex justify-content-between align-items-center"
    >
      <h6 class="m-0 fw-bold base-txt-primary">Class Subject Mapping Setup</h6>

      <div class="d-flex flex-wrap gap-2 align-items-center">
        <button
          type="button"
          class="btn btn-sm base-btn-outline-orange fw-medium px-2"
          (click)="disableOrEnable()"
        >
          <i class="fas fa-toggle-on mr-1" aria-hidden="true"></i>
          &nbsp;{{ disableButton }}
        </button>

        <button
          type="button"
          class="btn btn-sm base-btn-primary fw-medium px-3"
          (click)="addMapping()"
          title="Add Mapping"
        >
          <i class="fas fa-plus" aria-hidden="true"></i> Add
        </button>

        <button
          type="button"
          class="btn btn-sm btn-warning fw-medium px-3"
          (click)="editMapping()"
          title="Edit Mapping"
        >
          <i class="fas fa-edit" aria-hidden="true"></i> Edit
        </button>

        <button
          type="button"
          class="btn btn-sm btn-danger fw-medium px-3"
          (click)="deleteMapping()"
          title="Delete Mapping"
        >
          <i class="fas fa-trash-alt" aria-hidden="true"></i> Delete
        </button>
      </div>
    </div>

    <div class="card-body">
      <!-- Filter Bar -->
      <div class="card border border-2 action-bar mb-2">
        <div
          class="card-body d-flex flex-wrap gap-2 justify-content-end py-0 px-2"
        >
          <div class="row justify-content-center align-items-center">
            <div class="mt-3 mt-xl-0">
              <div class="custom-radio-group d-flex flex-wrap">
                <div class="form-check">
                  <input
                    type="radio"
                    id="statusActive"
                    name="statusOptions"
                    (click)="statusCheck('A')"
                    [(ngModel)]="activeInactiveFlag"
                    class="custom-control-input"
                    value="A"
                  />
                  <label class="form-check-label p-2" for="statusActive"
                    >Active</label
                  >
                </div>
                <div class="form-check">
                  <input
                    type="radio"
                    id="statusInactive"
                    name="statusOptions"
                    (click)="statusCheck('I')"
                    [(ngModel)]="activeInactiveFlag"
                    class="custom-control-input"
                    value="I"
                  />
                  <label class="form-check-label p-2" for="statusInactive"
                    >Inactive</label
                  >
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- Data Grid -->
      <div class="row">
        <div class="col-md-12">
          <div class="card mb-4">
            <div class="card-body">
              <div class="table-responsive">
                <table
                  #mappingGrid
                  class="row-border hover table table-sm"
                ></table>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
