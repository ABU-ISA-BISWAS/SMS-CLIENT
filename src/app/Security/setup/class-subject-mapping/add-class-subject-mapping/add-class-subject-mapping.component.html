<!-- Modal Header -->
<div class="modal-header border-0 pb-0">
  <div class="d-flex align-items-center gap-2">
    <div class="modal-header-icon">
      <i class="ti ti-git-merge fs-16px" aria-hidden="true"></i>
    </div>
    <div>
      <h6 class="modal-title m-0 fw-bold base-txt-primary lh-1">{{ title }}</h6>
      <small class="text-body-secondary fs-11px"
        >Manage class-subject mapping</small
      >
    </div>
  </div>
  <button
    type="button"
    class="modal-close-btn btn btn-sm btn-light border"
    aria-label="Close"
    (click)="bsModalRef.hide()"
  >
    <i class="ti ti-x fs-13px" aria-hidden="true"></i>
  </button>
</div>

<!-- Modal Body -->
<div class="modal-body pt-3 pb-2">
  <div class="mapping-form-grid">
    <!-- Class -->
    <div class="field-group">
      <label class="field-label"
        >Class <span class="text-danger">*</span></label
      >
      <div class="input-field-wrapper">
        <i class="ti ti-school field-icon-left" aria-hidden="true"></i>
        <select
          class="form-select field-select"
          [(ngModel)]="mapping.classMasterNo"
          name="classMasterNo"
        >
          <option [ngValue]="undefined">-- Select Class --</option>
          <option *ngFor="let cls of classList" [value]="cls.id">
            {{ cls.className }}
          </option>
        </select>
      </div>
    </div>

    <!-- Group / Version -->
    <div class="field-group">
      <label class="field-label">Group / Version</label>
      <div class="input-field-wrapper">
        <i class="ti ti-layout-list field-icon-left" aria-hidden="true"></i>
        <select
          class="form-select field-select"
          [(ngModel)]="mapping.groupVersionNo"
          name="groupVersionNo"
        >
          <option [ngValue]="undefined">-- All Groups --</option>
          <option *ngFor="let grp of groupList" [value]="grp.id">
            {{ grp.name }}
          </option>
        </select>
      </div>
    </div>

    <!-- Subject -->
    <div class="field-group">
      <label class="field-label"
        >Subject <span class="text-danger">*</span></label
      >
      <div class="input-field-wrapper">
        <i class="ti ti-book field-icon-left" aria-hidden="true"></i>
        <select
          class="form-select field-select"
          [(ngModel)]="mapping.subjectMasterNo"
          name="subjectMasterNo"
        >
          <option [ngValue]="undefined">-- Select Subject --</option>
          <option *ngFor="let sub of subjectList" [value]="sub.id">
            {{ sub.subjectCode }} - {{ sub.subjectName }}
          </option>
        </select>
      </div>
    </div>

    <!-- Sort Order -->
    <div class="field-group">
      <label class="field-label">Sort Order</label>
      <div class="input-field-wrapper">
        <i
          class="ti ti-sort-ascending-numbers field-icon-left"
          aria-hidden="true"
        ></i>
        <input
          type="number"
          class="form-control field-input"
          placeholder="Enter sort order"
          [(ngModel)]="mapping.sortOrder"
          min="0"
        />
      </div>
    </div>

    <!-- Subject -->
    <div class="field-group">
      <label class="field-label">Full Marks</label>
      <div class="input-field-wrapper">
        <i
          class="ti ti-sort-ascending-numbers field-icon-left"
          aria-hidden="true"
        ></i>
        <input
          type="number"
          class="form-control field-input"
          placeholder="Enter Full Marks"
          [(ngModel)]="mapping.fullMarks"
          min="0"
        />
      </div>
    </div>

    <!-- Sort Order -->
    <div class="field-group">
      <label class="field-label">Pass Marks</label>
      <div class="input-field-wrapper">
        <i
          class="ti ti-sort-ascending-numbers field-icon-left"
          aria-hidden="true"
        ></i>
        <input
          type="number"
          class="form-control field-input"
          placeholder="Enter Pass Marks"
          [(ngModel)]="mapping.passMarks"
          min="0"
        />
      </div>
    </div>

    <!-- Checkboxes -->
    <div class="field-group mapping-col-full">
      <div class="checkbox-row">
        <label class="checkbox-item">
          <input
            type="checkbox"
            [(ngModel)]="mapping.isOptional"
            class="checkbox-input"
          />
          <span class="checkbox-label">Optional Subject</span>
        </label>
        <label class="checkbox-item">
          <input
            type="checkbox"
            [(ngModel)]="mapping.activeStatus"
            class="checkbox-input"
          />
          <span class="checkbox-label">Active Status</span>
        </label>
      </div>
    </div>
  </div>
</div>

<!-- Modal Footer -->
<div class="modal-footer border-0 modal-footer-custom">
  <button
    type="button"
    class="btn btn-sm btn-light border fw-medium px-4 fixed-width-btn"
    (click)="bsModalRef.hide()"
  >
    Close
  </button>
  <button
    type="button"
    class="btn btn-sm base-btn-primary fw-medium px-4 fixed-width-btn"
    (click)="saveMapping()"
    [disabled]="isSaving"
  >
    <i
      *ngIf="isSaving"
      class="ti ti-loader-2 spin me-1 fs-13px"
      aria-hidden="true"
    ></i>
    {{ isSaving ? "Saving..." : "Save" }}
  </button>
</div>
