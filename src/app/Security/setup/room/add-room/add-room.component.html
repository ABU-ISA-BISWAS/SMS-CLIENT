<!-- Modal Header -->
<div class="modal-header border-0 pb-0">
  <div class="d-flex align-items-center gap-2">
    <div class="modal-header-icon">
      <i class="ti ti-door fs-16px" aria-hidden="true"></i>
    </div>
    <div>
      <h6 class="modal-title m-0 fw-bold base-txt-primary lh-1">{{ title }}</h6>
      <small class="text-body-secondary fs-11px">Manage room information</small>
    </div>
  </div>
  <button
    type="button"
    class="modal-close-btn btn btn-sm btn-light border"
    aria-label="Close"
    (click)="bsModalRef.hide()"
  >
    <i class="ti ti-x fs-13px" aria-hidden="true"></i>
  </button>
</div>

<!-- Modal Body -->
<div class="modal-body pt-3 pb-2">
  <div class="room-form-grid">
    <!-- Building -->
    <div class="field-group">
      <label class="field-label"
        >Building <span class="text-danger">*</span></label
      >
      <div class="input-field-wrapper">
        <i class="ti ti-building field-icon-left" aria-hidden="true"></i>
        <select class="form-select field-select" [(ngModel)]="room.buildingNo">
          <option [ngValue]="undefined">-- Select Building --</option>
          <option *ngFor="let b of buildingList" [value]="b.id">
            {{ b.buildingName }}
          </option>
        </select>
      </div>
    </div>

    <!-- Room Code -->
    <div class="field-group">
      <label class="field-label"
        >Room Code <span class="text-danger">*</span></label
      >
      <div class="input-field-wrapper">
        <i class="ti ti-hash field-icon-left" aria-hidden="true"></i>
        <input
          type="text"
          class="form-control field-input"
          placeholder="e.g. R-101"
          [(ngModel)]="room.roomCode"
          [disabled]="!!room.id"
        />
      </div>
    </div>

    <!-- Room Type -->
    <div class="field-group">
      <label class="field-label"
        >Room Type <span class="text-danger">*</span></label
      >
      <div class="input-field-wrapper">
        <i class="ti ti-tag field-icon-left" aria-hidden="true"></i>
        <select class="form-select field-select" [(ngModel)]="room.roomType">
          <option *ngFor="let t of roomTypes" [value]="t.value">
            {{ t.label }}
          </option>
        </select>
      </div>
    </div>

    <!-- Room Name -->
    <div class="field-group">
      <label class="field-label">Room Name</label>
      <div class="input-field-wrapper">
        <i class="ti ti-door field-icon-left" aria-hidden="true"></i>
        <input
          type="text"
          class="form-control field-input"
          placeholder="e.g. Class Room 101"
          [(ngModel)]="room.roomName"
        />
      </div>
    </div>

    <!-- Floor No -->
    <div class="field-group">
      <label class="field-label">Floor No.</label>
      <div class="input-field-wrapper">
        <i class="ti ti-stairs field-icon-left" aria-hidden="true"></i>
        <input
          type="number"
          class="form-control field-input"
          placeholder="0 = Ground"
          [(ngModel)]="room.floorNo"
          min="0"
        />
      </div>
    </div>

    <!-- Capacity -->
    <div class="field-group">
      <label class="field-label">Capacity</label>
      <div class="input-field-wrapper">
        <i class="ti ti-users field-icon-left" aria-hidden="true"></i>
        <input
          type="number"
          class="form-control field-input"
          placeholder="e.g. 50"
          [(ngModel)]="room.capacity"
          min="1"
        />
      </div>
    </div>

    <!-- Status -->
    <div class="field-group room-col-full">
      <div class="checkbox-row">
        <label class="checkbox-item">
          <input
            type="checkbox"
            [(ngModel)]="room.activeStatus"
            class="checkbox-input"
          />
          <span class="checkbox-label">Active Status</span>
        </label>
      </div>
    </div>
  </div>
</div>

<!-- Modal Footer -->
<div class="modal-footer border-0 modal-footer-custom">
  <button
    type="button"
    class="btn btn-sm btn-light border fw-medium px-4 fixed-width-btn"
    (click)="bsModalRef.hide()"
  >
    Close
  </button>
  <button
    type="button"
    class="btn btn-sm base-btn-primary fw-medium px-4 fixed-width-btn"
    (click)="saveRoom()"
    [disabled]="isSaving"
  >
    <i
      *ngIf="isSaving"
      class="ti ti-loader-2 spin me-1 fs-13px"
      aria-hidden="true"
    ></i>
    {{ isSaving ? "Saving..." : "Save" }}
  </button>
</div>
