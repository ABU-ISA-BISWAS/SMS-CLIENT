<div class="container-fluid">
  <div class="card">
    <div
      class="card-header py-2 d-flex justify-content-between align-items-center"
    >
      <h6 class="m-0 fw-bold base-txt-primary">Room / Classroom Setup</h6>

      <div class="d-flex flex-wrap gap-2 align-items-center">
        <button
          type="button"
          class="btn btn-sm base-btn-outline-orange fw-medium px-2"
          (click)="disableOrEnable()"
        >
          <i class="fas fa-toggle-on mr-1"></i>&nbsp;{{ disableButton }}
        </button>
        <button
          type="button"
          class="btn btn-sm base-btn-primary fw-medium px-3"
          (click)="addRoom()"
        >
          <i class="fas fa-plus"></i> Add
        </button>
        <button
          type="button"
          class="btn btn-sm btn-warning fw-medium px-3"
          (click)="editRoom()"
        >
          <i class="fas fa-edit"></i> Edit
        </button>
        <button
          type="button"
          class="btn btn-sm btn-danger fw-medium px-3"
          (click)="deleteRoom()"
        >
          <i class="fas fa-trash-alt"></i> Delete
        </button>
      </div>
    </div>
    <div class="card-body">
      <div class="card border border-2 action-bar mb-2">
        <div class="card-body py-1 px-3">
          <div class="row align-items-center g-2">
            <div class="col-auto">
              <div class="input-group input-group-sm">
                <span
                  class="input-group-text base-bg-subtle-primary base-txt-primary fw-semibold"
                >
                  Building
                </span>
                <select
                  class="form-select form-select-sm"
                  [(ngModel)]="filterBuildingNo"
                  style="min-width: 160px"
                >
                  <option [ngValue]="null">All Buildings</option>
                  <option *ngFor="let b of buildingList" [value]="b.id">
                    {{ b.buildingName }}
                  </option>
                </select>
              </div>
            </div>
            <div class="col-auto">
              <button
                class="btn btn-sm btn-primary px-3"
                (click)="applyFilter()"
              >
                <i class="fas fa-filter"></i> Filter
              </button>
              <button
                class="btn btn-sm btn-danger border px-3 ms-1"
                (click)="clearFilter()"
              >
                <i class="fas fa-times"></i> Clear
              </button>
            </div>
            <div class="col-auto ms-auto">
              <div class="custom-radio-group d-flex flex-wrap">
                <div class="form-check">
                  <input
                    type="radio"
                    id="roomActive"
                    name="roomStatus"
                    (click)="statusCheck('A')"
                    [(ngModel)]="activeInactiveFlag"
                    class="custom-control-input"
                    value="A"
                  />
                  <label class="form-check-label p-2" for="roomActive"
                    >Active</label
                  >
                </div>
                <div class="form-check">
                  <input
                    type="radio"
                    id="roomInactive"
                    name="roomStatus"
                    (click)="statusCheck('I')"
                    [(ngModel)]="activeInactiveFlag"
                    class="custom-control-input"
                    value="I"
                  />
                  <label class="form-check-label p-2" for="roomInactive"
                    >Inactive</label
                  >
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>

      <div class="row">
        <div class="col-md-12">
          <div class="card mb-4">
            <div class="card-body">
              <div class="table-responsive">
                <table
                  #roomGrid
                  class="row-border hover table table-sm"
                ></table>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
