<!-- Modal Header -->
<div class="modal-header border-0 pb-0">
  <div class="d-flex align-items-center gap-2">
    <div class="modal-header-icon">
      <i class="ti ti-layout-grid fs-16px" aria-hidden="true"></i>
    </div>
    <div>
      <h6 class="modal-title m-0 fw-bold base-txt-primary lh-1">{{ title }}</h6>
      <small class="text-body-secondary fs-11px">Manage system module</small>
    </div>
  </div>
  <button
    type="button"
    class="modal-close-btn btn btn-sm btn-light border"
    aria-label="Close"
    (click)="bsModalRef.hide()"
  >
    <i class="ti ti-x fs-13px" aria-hidden="true"></i>
  </button>
</div>

<!-- Modal Body -->
<div class="modal-body pt-3 pb-2">
  <!-- Module Name -->
  <div class="field-group">
    <label class="field-label">Module Name</label>
    <div class="input-field-wrapper">
      <i class="ti ti-puzzle field-icon-left" aria-hidden="true"></i>
      <input
        type="text"
        class="form-control field-input"
        placeholder="Enter module name"
        [(ngModel)]="module.menuName"
      />
    </div>
  </div>

  <!-- Parent Module -->
  <div class="field-group">
    <label class="field-label">Parent Module</label>
    <div class="input-field-wrapper">
      <i class="ti ti-hierarchy field-icon-left" aria-hidden="true"></i>
      <input
        type="number"
        class="form-control field-input"
        placeholder="Enter parent module number"
        [(ngModel)]="module.parentMenuNo"
      />
    </div>
  </div>

  <!-- Module Code -->
  <div class="field-group">
    <label class="field-label">Module Code</label>
    <div class="input-field-wrapper">
      <i class="ti ti-code field-icon-left" aria-hidden="true"></i>
      <input
        type="text"
        class="form-control field-input"
        placeholder="Enter module code"
        [(ngModel)]="module.menuId"
      />
    </div>
  </div>

  <!-- Module Icon -->
  <div class="field-group">
    <label class="field-label">Module Icon</label>
    <div class="input-field-wrapper">
      <i class="ti ti-icons field-icon-left" aria-hidden="true"></i>
      <div class="field-input-group">
        <input
          type="text"
          class="form-control field-input"
          placeholder="Enter icon class"
          [(ngModel)]="module.menuIcon"
        />
        <button
          class="btn btn-sm base-btn-primary field-append-btn"
          (click)="selectIcon()"
          type="button"
        >
          <i class="ti ti-plus fs-13px" aria-hidden="true"></i> Pick
        </button>
      </div>
    </div>
  </div>
</div>

<!-- Modal Footer -->
<div class="modal-footer border-0 modal-footer-custom">
  <button
    type="button"
    class="btn btn-sm btn-light border fw-medium px-4 fixed-width-btn"
    (click)="bsModalRef.hide()"
  >
    Close
  </button>
  <button
    type="button"
    class="btn btn-sm base-btn-primary fw-medium px-4 fixed-width-btn"
    (click)="saveModule()"
    [disabled]="isSaving"
  >
    <i
      *ngIf="isSaving"
      class="ti ti-loader-2 spin me-1 fs-13px"
      aria-hidden="true"
    ></i>
    {{ isSaving ? "Saving..." : "Save" }}
  </button>
</div>
