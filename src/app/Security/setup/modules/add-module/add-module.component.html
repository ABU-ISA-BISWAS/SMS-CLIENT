<div class="modal-header border-0">
  <h6 class="modal-title m-0 fw-bold base-txt-primary">{{title}}</h6>
  <button type="button" class="btn-close close pull-right fs-13px btn btn-sm btn-light" aria-label="Close"
    (click)="bsModalRef.hide()">
    <span aria-hidden="true" class="visually-hidden">&times;</span>
  </button>
</div>

<div class="modal-body">

  <div class="border p-3  mb-3">

    <div class="input-group required mb-2  positionRelative">
      <span for="fatherName" class="input-group-text base-bg-subtle-primary base-txt-primary">Module Name:</span>
      <input type="text" class="form-control" 
        [(ngModel)]="module.menuName" />
    </div>

    <div class="input-group required mb-2 positionRelative">
      <span class="input-group-text base-bg-subtle-primary base-txt-primary">Parent Module:</span>
      <input  type="number" class="form-control" [(ngModel)]="module.parentMenuNo">
    </div>

       <div class="input-group required mb-2 positionRelative">
      <span class="input-group-text base-bg-subtle-primary base-txt-primary">Module Code:</span>
      <input type="text" class="form-control" [(ngModel)]="module.menuId">
    </div>

 

    <div class="input-group mb-2">
      <span class="input-group-text base-bg-subtle-primary base-txt-primary">Module Icon:</span>
      <input type="text" class="form-control" [(ngModel)]="module.menuIcon">
      <button class="btn btn-info addfeature" (click)="selectIcon()" type="button">
        <i class="fas fa-plus " aria-hidden="true"></i>
      </button>
    </div>
  </div>

</div>


<div class="modal-footer border-0 bg-light">
  <button type="button" class="btn btn-sm btn-light fw-medium close px-3 m-0 text-body-secondary fixed-width-btn"
    (click)="bsModalRef.hide()">Close</button>
  <button type="button" class="btn btn-sm base-btn-primary fw-medium py-1 px-3 m-0 ms-3 fixed-width-btn"
    (click)="saveModule()" [disabled] = "isSaving">
    {{ isSaving ? 'Saving' : 'Save'}}
  </button>
</div>
