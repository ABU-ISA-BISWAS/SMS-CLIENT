<div class="container-fluid">
  <div class="card">
    <div class="card-header py-3">
      <h6 class="m-0 fw-bold base-txt-primary">Employee Setup</h6>
    </div>

    <div class="card-body">
      <!-- Action Bar -->
      <div class="card border border-2 action-bar mb-2">
        <div
          class="card-body d-flex flex-wrap gap-2 justify-content-xxl-end justify-content-end py-1 px-3"
        >
          <button
            type="button"
            class="btn btn-sm base-btn-outline-skyblue fw-medium px-2 mb-xxl-0"
            (click)="addSignature()"
            title="Add Signature"
          >
            <i class="fas fa-user-plus"></i> Add Signature
          </button>

          <button
            type="button"
            class="btn btn-sm base-btn-outline-purple fw-medium px-2 mb-xxl-0"
            (click)="addBankInfo()"
            title="Add Bank Info"
          >
            <i class="fas fa-user-circle"></i> Add Bank Info
          </button>

          <button
            type="button"
            class="btn btn-sm btn-outline-danger fw-medium px-2 mb-xxl-0"
            (click)="resetFilter()"
          >
            <i class="fas fa-trash-alt"></i> Clear Filter
          </button>

          <div class="vr"></div>

          <button
            type="button"
            class="btn btn-sm base-btn-primary fw-medium px-3 mb-xxl-0"
            (click)="addPersonnel()"
          >
            <i class="fas fa-plus-circle"></i> Add
          </button>
          <button
            type="button"
            class="btn btn-sm btn-warning fw-medium px-3 mb-xxl-0"
            (click)="editPersonnel()"
          >
            <i class="fas fa-edit"></i> Edit
          </button>
          <button
            type="button"
            class="btn btn-sm btn-danger fw-medium px-2 mb-xxl-0"
            (click)="deletePersonnel()"
          >
            <i class="fas fa-trash-alt"></i> Delete
          </button>
        </div>
      </div>

      <!-- Filter Bar -->
      <div class="card border border-2 filter-bar mb-2">
        <div class="card-body">
          <div class="row justify-content-center align-items-center">
            <div class="col-xl-12 col-lg-12 col-12">
              <div class="row g-2">
                <div class="col-md-6 col-xl-3 col-xxl-3">
                  <div class="input-group">
                    <span
                      class="input-group-text base-bg-subtle-primary base-txt-primary"
                      >Departments</span
                    >
                    <select
                      name="Department"
                      class="form-control form-select"
                      [(ngModel)]="departmentFilter"
                      (ngModelChange)="onChangeDept()"
                    >
                      <option [ngValue]="0" selected>All Departments</option>
                      <option
                        *ngFor="let department of hrBuList"
                        [ngValue]="department.id"
                      >
                        {{ department.buName }}
                      </option>
                      <!-- @for(department of hrBuList; track $index){
											<option [ngValue]="department.id">{{department.buName}}</option>
											} -->
                    </select>
                  </div>
                </div>

                <div class="col-md-6 col-xl-3 col-xxl-3">
                  <div class="input-group">
                    <span
                      class="input-group-text base-bg-subtle-primary base-txt-primary"
                      >Job Title</span
                    >
                    <select
                      name="JobTitle"
                      class="form-control form-select"
                      [(ngModel)]="jobTitleFilter"
                      (ngModelChange)="onChangeJobtitle()"
                    >
                      <option [ngValue]="0" selected>Job Title</option>

                      @for (job of hrJobTitleList; track $index) {
                        <option [ngValue]="job.jobtitleNo">
                          {{ job.jobtitle }}
                        </option>
                      }
                    </select>
                  </div>
                </div>

                <div class="col-md-6 col-xl-3 col-xxl-3">
                  <div class="input-group">
                    <span
                      class="input-group-text base-bg-subtle-primary base-txt-primary"
                      >Job Type</span
                    >
                    <select
                      name="JobType"
                      class="form-control form-select"
                      [(ngModel)]="jobTypeFilter"
                      (ngModelChange)="onChangeJobType()"
                    >
                      <option [ngValue]="0" selected>Job Type</option>
                      @for (job of jobTypeList; track $index) {
                        <option [ngValue]="job.id">{{ job.detailName }}</option>
                      }
                    </select>
                  </div>
                </div>

                <div class="col-md-6 col-xl-3 col-xxl-3">
                  <div class="input-group">
                    <span
                      class="input-group-text base-bg-subtle-primary base-txt-primary"
                      >Emp. Type</span
                    >
                    <select
                      name="EmpType"
                      class="form-control form-select"
                      [(ngModel)]="empTypeFilter"
                      (ngModelChange)="onChangeEmpType()"
                    >
                      <option [ngValue]="0" selected>Emp. Type</option>

                      @for (emp of empTypeList; track $index) {
                        <option [ngValue]="emp.id">{{ emp.detailName }}</option>
                      }
                    </select>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>

      <div class="row">
        <div class="col-md-12">
          <div class="card mb-4">
            <div class="card-body">
              <div class="table-responsive">
                <table #empGrid class="row-border hover table table-sm"></table>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
