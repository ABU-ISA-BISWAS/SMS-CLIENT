<div class="container-fluid">
  <div class="card">
    <!-- ═══════════════════════════════════════════
         LIST VIEW
    ════════════════════════════════════════════ -->
    <ng-container *ngIf="!isFormVisible">
      <div
        class="card-header py-2 d-flex justify-content-between align-items-center"
      >
        <h6 class="m-0 fw-bold base-txt-primary">Employee Setup</h6>
        <div class="d-flex flex-wrap gap-2 align-items-center">
          <button
            type="button"
            class="btn btn-sm base-btn-outline-skyblue fw-medium px-2"
            (click)="addSignature()"
          >
            <i class="fas fa-signature"></i> Add Signature
          </button>

          <button
            type="button"
            class="btn btn-sm base-btn-outline-purple fw-medium px-2"
            (click)="addBankInfo()"
          >
            <i class="fas fa-university"></i> Add Bank Info
          </button>

          <button
            type="button"
            class="btn btn-sm btn-outline-danger fw-medium px-2"
            (click)="resetFilter()"
          >
            <i class="fas fa-times"></i> Clear Filter
          </button>

          <div class="vr"></div>

          <button
            type="button"
            class="btn btn-sm base-btn-primary fw-medium px-3"
            (click)="openForm('add')"
          >
            <i class="fas fa-plus-circle"></i> Add
          </button>
          <button
            type="button"
            class="btn btn-sm btn-warning fw-medium px-3"
            (click)="openForm('edit')"
          >
            <i class="fas fa-edit"></i> Edit
          </button>
          <button
            type="button"
            class="btn btn-sm btn-danger fw-medium px-2"
            (click)="deletePersonnel()"
          >
            <i class="fas fa-trash-alt"></i> Delete
          </button>
        </div>
      </div>

      <div class="card-body">
        <!-- Filter Bar -->
        <div class="card border border-2 action-bar mb-2">
          <div class="card-body py-1">
            <div class="row g-2">
              <div class="col-md-6 col-xl-3">
                <div class="input-group input-group-sm">
                  <span
                    class="input-group-text base-bg-subtle-primary base-txt-primary"
                  >
                    Department
                  </span>
                  <select
                    class="form-control form-select"
                    [(ngModel)]="departmentFilter"
                    (ngModelChange)="onChangeDept()"
                  >
                    <option [ngValue]="0">All Departments</option>
                    <option *ngFor="let d of hrBuList" [ngValue]="d.id">
                      {{ d.deptName }}
                    </option>
                  </select>
                </div>
              </div>
              <div class="col-md-6 col-xl-3">
                <div class="input-group input-group-sm">
                  <span
                    class="input-group-text base-bg-subtle-primary base-txt-primary"
                  >
                    Job Title
                  </span>
                  <select
                    class="form-control form-select"
                    [(ngModel)]="jobTitleFilter"
                    (ngModelChange)="onChangeJobtitle()"
                  >
                    <option [ngValue]="0">All Job Titles</option>
                    <option *ngFor="let j of hrJobTitleList" [ngValue]="j.id">
                      {{ j.desigName }}
                    </option>
                  </select>
                </div>
              </div>
              <div class="col-md-6 col-xl-3">
                <div class="input-group input-group-sm">
                  <span
                    class="input-group-text base-bg-subtle-primary base-txt-primary"
                  >
                    Job Type
                  </span>
                  <select
                    class="form-control form-select"
                    [(ngModel)]="jobTypeFilter"
                    (ngModelChange)="onChangeJobType()"
                  >
                    <option [ngValue]="''">All Job Types</option>
                    <option
                      *ngFor="let j of jobTypeList"
                      [ngValue]="j.jobTypeName"
                    >
                      {{ j.jobTypeName }}
                    </option>
                  </select>
                </div>
              </div>
              <div class="col-md-6 col-xl-3">
                <div class="input-group input-group-sm">
                  <span
                    class="input-group-text base-bg-subtle-primary base-txt-primary"
                  >
                    Emp. Type
                  </span>
                  <select
                    class="form-control form-select"
                    [(ngModel)]="empTypeFilter"
                    (ngModelChange)="onChangeEmpType()"
                  >
                    <option [ngValue]="''">All Types</option>
                    <option
                      *ngFor="let e of empTypeList"
                      [ngValue]="e.employeeTypeName"
                    >
                      {{ e.employeeTypeName }}
                    </option>
                  </select>
                </div>
              </div>
            </div>
          </div>
        </div>

        <!-- DataTable -->
        <div class="row">
          <div class="col-md-12">
            <div class="card mb-4">
              <div class="card-body">
                <div class="table-responsive">
                  <table
                    #empGrid
                    class="row-border hover table table-sm"
                  ></table>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </ng-container>

    <!-- ═══════════════════════════════════════════
         FORM VIEW  — 3-step wizard
    ════════════════════════════════════════════ -->
    <ng-container *ngIf="isFormVisible">
      <!-- Form Header -->
      <div
        class="card-header py-2 d-flex justify-content-between align-items-center"
      >
        <div class="d-flex align-items-center gap-2">
          <button class="btn btn-sm btn-light border" (click)="closeForm()">
            <i class="fas fa-arrow-left"></i>
          </button>
          <h6 class="m-0 fw-bold base-txt-primary">
            {{ formMode === "add" ? "Add New Employee" : "Edit Employee" }}
          </h6>
        </div>
        <div class="d-flex align-items-center gap-2">
          <span class="text-muted" style="font-size: 12px">
            Step {{ currentStep }} of {{ totalSteps }}
          </span>
          <button class="btn btn-sm btn-light border" (click)="closeForm()">
            <i class="fas fa-times"></i>
          </button>
        </div>
      </div>

      <div class="card-body p-0">
        <!-- Step Indicator -->
        <div class="emp-step-wrap">
          <div class="emp-step-bar">
            <div
              class="emp-step-bar__fill"
              [style.width.%]="stepProgress"
            ></div>
          </div>
          <div class="emp-step-nodes">
            <div
              *ngFor="let s of steps"
              class="emp-step-node"
              [class.active]="currentStep === s.no"
              [class.done]="currentStep > s.no"
              (click)="goToStep(s.no)"
            >
              <div class="emp-step-node__circle">
                <i *ngIf="currentStep > s.no" class="fas fa-check"></i>
                <span *ngIf="currentStep <= s.no">{{ s.no }}</span>
              </div>
              <div class="emp-step-node__label">{{ s.label }}</div>
            </div>
          </div>
        </div>

        <!-- Step Content -->
        <div class="emp-step-body">
          <!-- STEP 1: Basic Information -->
          <div *ngIf="currentStep === 1">
            <app-personal-info-tab
              #personalTab
              [jobType]="jobTypeList"
              [maritalStatus]="maritalStatusList"
              [jobTitle]="hrJobTitleList"
              [department]="hrBuList"
              [gender]="genderList"
              [doctorNo]="doctorName"
              [sharedEmployee]="sharedEmployee"
              (imgImmite)="fileImmite($event)"
            >
            </app-personal-info-tab>
          </div>

          <!-- STEP 2: Other Information -->
          <div *ngIf="currentStep === 2">
            <app-official-info-tab
              #officialTab
              [empType]="empTypeList"
              [bloodGroup]="bloodGroupList"
              [religionList]="religionList"
              [sharedEmployee]="sharedEmployee"
            >
            </app-official-info-tab>
          </div>

          <!-- STEP 3: Address Details -->
          <div *ngIf="currentStep === 3">
            <app-address-tab
              #addressTab
              [district]="districtList"
              [country]="countryList"
              [guardianRelationList]="guardianRelationList"
              [sharedEmployee]="sharedEmployee"
            >
            </app-address-tab>
          </div>
        </div>

        <!-- Form Footer -->
        <div class="emp-form-footer">
          <!-- Back / Cancel -->
          <button
            class="btn btn-sm btn-light border px-3"
            *ngIf="currentStep > 1"
            (click)="prevStep()"
          >
            <i class="fas fa-arrow-left me-1"></i> Back
          </button>
          <button
            class="btn btn-sm btn-light border px-3"
            *ngIf="currentStep === 1"
            (click)="closeForm()"
          >
            Cancel
          </button>

          <div class="ms-auto d-flex gap-2">
            <!-- Next (steps 1 & 2) -->
            <button
              class="btn btn-sm base-btn-primary px-4"
              *ngIf="currentStep < totalSteps"
              (click)="nextStep()"
            >
              Next <i class="fas fa-arrow-right ms-1"></i>
            </button>

            <!-- Save (last step only) -->
            <button
              class="btn btn-sm base-btn-primary px-4"
              *ngIf="currentStep === totalSteps"
              (click)="saveEmployee()"
              [disabled]="isSaving"
            >
              <span *ngIf="!isSaving">
                <i class="fas fa-save me-1"></i>
                {{ formMode === "add" ? "Save Employee" : "Update Employee" }}
              </span>
              <span *ngIf="isSaving">
                <span class="spinner-border spinner-border-sm me-1"></span>
                Saving...
              </span>
            </button>
          </div>
        </div>
      </div>
    </ng-container>
  </div>
</div>
