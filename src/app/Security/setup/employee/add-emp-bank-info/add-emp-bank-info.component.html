<div class="modal-header border-0">
  <h6 class="modal-title m-0 fw-bold base-txt-primary">{{title}}</h6>
  <button type="button" class="btn-close close pull-right fs-13px btn btn-sm btn-light" aria-label="Close"
    (click)="bsModalRef.hide()">
    <span aria-hidden="true" class="visually-hidden">&times;</span>
  </button>
</div>

<div class="modal-body">
  <div [hidden]="!isShowDatagrid" class="modal-body p-0">
    <div class="tableAllArea">
      <div class="clearfix"></div>
      <div class="row">
        <div class="col-md-12 padding-left-right">
          <div class="all_content_wrapper">
            <div class="allInner">
              <div class="row margin-left-right-20">
                <div class="col-md-12 col-sm-12">
                  <div class="pannelHeading pan-width-header">
                    <div class="col-md-12">
                      <div class="d-flex justify-content-end bg-light p-2 border rounded ">
                        <div class="card-body d-flex flex-wrap gap-2 justify-content-xxl-end justify-content-center ">
                          <button title="Set Default" class="btn btn-sm base-btn-primary fw-medium py-1 px-3 m-0 ms-3"
                            (click)="setDefault()">
                            <i class="fa fa-plus-circle" aria-hidden="true"></i>&nbsp; Default
                          </button>
                          <button title="Add Dosage" class="btn btn-sm base-btn-primary fw-medium px-3 mb-2 mb-xxl-0"
                            (click)="onAdd()">
                            <i class="fa fa-plus-circle" aria-hidden="true"></i>&nbsp; Add
                          </button>
                          <button title="Edit Dosage" class="btn btn-sm btn-warning fw-medium px-3 mb-2 mb-xxl-0"
                            (click)="onEdit()">
                            <i class="fas fa-edit" aria-hidden="true"></i>&nbsp; Edit
                          </button>
                        </div>
                      </div>
                    </div>
                  </div>
                </div>
              </div>
              <div class="dataGridTable mt-3">
                <div class="table-responsive top-space">
                  <table #hrEmpBankInfoGrid class="row-border hover"></table>
                </div>
              </div>

            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="modal-body p-0" [hidden]="isShowDatagrid">
    <div class="d-flex justify-content-between align-items-center flex-wrap mb-3 bg-light">
      <h5 class="mb-0">{{ addEditTitle }}</h5>

      <div class="col-md-12 mt-2">
        <div class="d-flex justify-content-end bg-light p-2 border rounded">
          <button type="button" (click)="onHide()"
            class="btn btn-sm btn-danger fw-medium py-1 px-3 m-0 ms-3 fixed-width-btn">Cancel</button>

          <button title="Add Employee Bank Info." class="btn btn-sm base-btn-primary fw-medium py-1 px-3 m-0 ms-3 fixed-width-btn"
            (click)="onSaveOrUpdate()" [disabled] = "isSaving">
            {{ isSaving ? 'Saving' : 'Save'}}
          </button>

        </div>
      </div>
    </div>
    <div>

      <div class="input-group mb-2">
        <span for="" class="input-group-text base-bg-subtle-primary base-txt-primary col-sm-3">Bank
          Name:</span>
        <ng-select [items]="bankInfoList" placeholder="Select Bank Name" notFoundText="Bank information not Found"
          bindLabel="bankName" bindValue="id" [(ngModel)]="employeeBankInfoModel.bankNo"
          [ngModelOptions]="{standalone: true}" (ngModelChange)="selectBankName($event)" name="name"
          class="form-control form-select">
        </ng-select>
      </div>

      <div class="input-group mb-2">
        <span for="" class="input-group-text base-bg-subtle-primary base-txt-primary col-sm-3">Bank
          Account No:</span>
        <input type="text" class="form-control" placeholder="" name="bankAccountNo"
          [(ngModel)]="employeeBankInfoModel.bankAccountNo">
      </div>

      <div class="input-group mb-2">
        <span for="" class="input-group-text base-bg-subtle-primary base-txt-primary col-sm-3">Routing No:</span>
        <input type="text" class="form-control" placeholder="" name="routingNo"
          [(ngModel)]="employeeBankInfoModel.routingNo">
      </div>

      <div class="input-group mb-2">
        <span for="" class="input-group-text base-bg-subtle-primary base-txt-primary col-sm-3">Bank Branch:</span>
        <input type="text" class="form-control" placeholder="" name="bankBranch"
          [(ngModel)]="employeeBankInfoModel.bankBranch">
      </div>

      <div class="input-group mb-2">
        <span for="" class="input-group-text base-bg-subtle-primary base-txt-primary col-sm-3">Bank Account
          SwiftCode:</span>
        <input type="text" class="form-control" placeholder="" name="bankAccountSwiftcode"
          [(ngModel)]="employeeBankInfoModel.bankAccountSwiftcode">
      </div>

      <div class="row">
        <div class="col-12 d-flex justify-content-start flex-wrap">

          <div class="form-check flex-nowrap">
            <label for="defaultFlag" class="form-check-label text-dark text-nowrap ms-1">Active Status</label>
            <input type="checkbox" id="defaultFlag" [(ngModel)]="employeeBankInfoModel.defaultFlag"
              [ngModelOptions]="{standalone: true}" (ngModelChange)="employeeBankInfoModel.defaultFlag=$event?1:0"
              name="defaultFlag" class="form-check-input">
          </div>

          <div class="form-check flex-nowrap">
            <label for="activeInactive" class="form-check-label text-dark text-nowrap ms-1">Default Flag</label>
            <input type="checkbox" id="activeInactive" [(ngModel)]="employeeBankInfoModel.activeStatus"
              [ngModelOptions]="{standalone: true}" (ngModelChange)="employeeBankInfoModel.activeStatus=$event?1:0"
              name="activeInactive" class="form-check-input">
          </div>

        </div>
      </div>

    </div>
  </div>
</div>

<div class="modal-footer border-0 bg-light">
  <button type="button" class="btn btn-sm btn-light fw-medium close px-3 m-0 text-body-secondary fixed-width-btn"
    (click)="bsModalRef.hide()">Close</button>
  <button type="button" class="btn btn-sm base-btn-primary fw-medium py-1 px-3 m-0 ms-3 fixed-width-btn" (click)="onSaveOrUpdate()" [disabled] = "isSaving">
   {{isSaving? "Saving":"Save"}}
  </button>
</div>
