<!-- Modal Header -->
<div class="modal-header border-0 pb-0">
  <div class="d-flex align-items-center gap-2">
    <div class="modal-header-icon">
      <i class="ti ti-building-bank fs-16px" aria-hidden="true"></i>
    </div>
    <div>
      <h6 class="modal-title m-0 fw-bold base-txt-primary lh-1">
        {{ title }}
      </h6>
      <small class="text-body-secondary fs-11px"
        >Manage employee bank information</small
      >
    </div>
  </div>
  <button
    type="button"
    class="modal-close-btn btn btn-sm btn-light border"
    aria-label="Close"
    (click)="bsModalRef.hide()"
  >
    <i class="ti ti-x fs-13px" aria-hidden="true"></i>
  </button>
</div>

<!-- Modal Body -->
<div class="modal-body pt-3 pb-2">
  <!-- ── DATAGRID VIEW ─────────────────────────────── -->
  <div [hidden]="!isShowDatagrid">
    <div class="modal-toolbar mb-3">
      <div class="ms-auto d-flex gap-2">
        <button
          title="Set Default"
          class="btn btn-sm btn-info border fw-medium px-3"
          (click)="setDefault()"
        >
          <i class="ti ti-star fs-13px me-1" aria-hidden="true"></i> Default
        </button>
        <button
          title="Add Bank Info"
          class="btn btn-sm base-btn-primary fw-medium px-3"
          (click)="onAdd()"
        >
          <i class="ti ti-plus fs-13px me-1" aria-hidden="true"></i> Add
        </button>
        <button
          title="Edit Bank Info"
          class="btn btn-sm btn-warning fw-medium px-3"
          (click)="onEdit()"
        >
          <i class="ti ti-pencil fs-13px me-1" aria-hidden="true"></i> Edit
        </button>
      </div>
    </div>
    <div class="table-responsive">
      <table #hrEmpBankInfoGrid class="row-border hover w-100"></table>
    </div>
  </div>

  <!-- ── ADD / EDIT FORM VIEW ──────────────────────── -->
  <div [hidden]="isShowDatagrid">
    <div class="form-section-header mb-3">
      <div class="d-flex align-items-center gap-2">
        <div class="form-section-icon">
          <i class="ti ti-forms fs-14px" aria-hidden="true"></i>
        </div>
        <span class="form-section-title">{{ addEditTitle }}</span>
      </div>
      <div class="d-flex gap-2 ms-auto">
        <button
          type="button"
          class="btn btn-sm btn-danger border fw-medium px-4 fixed-width-btn"
          (click)="onHide()"
        >
          Cancel
        </button>
        <button
          class="btn btn-sm base-btn-primary fw-medium px-4 fixed-width-btn"
          (click)="onSaveOrUpdate()"
          [disabled]="isSaving"
        >
          <i
            *ngIf="isSaving"
            class="ti ti-loader-2 spin me-1 fs-13px"
            aria-hidden="true"
          ></i>
          {{ isSaving ? "Saving..." : "Save" }}
        </button>
      </div>
    </div>

    <div class="form-fields-grid">
      <!-- Bank Name -->
      <div class="field-group">
        <label class="field-label"
          >Bank Name <span class="text-danger">*</span></label
        >
        <div class="input-field-wrapper">
          <i class="ti ti-building-bank field-icon-left" aria-hidden="true"></i>
          <ng-select
            [items]="bankInfoList"
            placeholder="Select Bank Name"
            notFoundText="Bank information not found"
            bindLabel="bankName"
            bindValue="id"
            [(ngModel)]="employeeBankInfoModel.bankNo"
            [ngModelOptions]="{ standalone: true }"
            (ngModelChange)="selectBankName($event)"
            name="name"
            class="ng-select-custom"
          ></ng-select>
        </div>
      </div>

      <!-- Bank Account No -->
      <div class="field-group">
        <label class="field-label"
          >Bank Account No <span class="text-danger">*</span></label
        >
        <div class="input-field-wrapper">
          <i class="ti ti-credit-card field-icon-left" aria-hidden="true"></i>
          <input
            type="text"
            class="form-control field-input"
            placeholder="Enter account number"
            name="bankAccountNo"
            [(ngModel)]="employeeBankInfoModel.bankAccountNo"
          />
        </div>
      </div>

      <!-- Routing No -->
      <div class="field-group">
        <label class="field-label">Routing No</label>
        <div class="input-field-wrapper">
          <i class="ti ti-route field-icon-left" aria-hidden="true"></i>
          <input
            type="text"
            class="form-control field-input"
            placeholder="Enter routing number"
            name="routingNo"
            [(ngModel)]="employeeBankInfoModel.routingNo"
          />
        </div>
      </div>

      <!-- Bank Branch -->
      <div class="field-group">
        <label class="field-label">Bank Branch</label>
        <div class="input-field-wrapper">
          <i class="ti ti-map-pin field-icon-left" aria-hidden="true"></i>
          <input
            type="text"
            class="form-control field-input"
            placeholder="Enter branch name"
            name="bankBranch"
            [(ngModel)]="employeeBankInfoModel.bankBranch"
          />
        </div>
      </div>

      <!-- Swift Code -->
      <div class="field-group field-group--full">
        <label class="field-label">Bank Account Swift Code</label>
        <div class="input-field-wrapper">
          <i class="ti ti-world field-icon-left" aria-hidden="true"></i>
          <input
            type="text"
            class="form-control field-input"
            placeholder="Enter SWIFT code"
            name="bankAccountSwiftcode"
            [(ngModel)]="employeeBankInfoModel.bankAccountSwiftcode"
          />
        </div>
      </div>

      <!-- Checkboxes -->
      <div class="field-group field-group--full">
        <div class="checkbox-row">
          <label class="checkbox-item">
            <input
              type="checkbox"
              id="defaultFlag"
              [(ngModel)]="employeeBankInfoModel.defaultFlag"
              [ngModelOptions]="{ standalone: true }"
              (ngModelChange)="
                employeeBankInfoModel.defaultFlag = $event ? 1 : 0
              "
              name="defaultFlag"
              class="checkbox-input"
            />
            <span class="checkbox-label">Default Flag</span>
          </label>
          <label class="checkbox-item">
            <input
              type="checkbox"
              id="activeInactive"
              [(ngModel)]="employeeBankInfoModel.activeStatus"
              [ngModelOptions]="{ standalone: true }"
              (ngModelChange)="
                employeeBankInfoModel.activeStatus = $event ? 1 : 0
              "
              name="activeInactive"
              class="checkbox-input"
            />
            <span class="checkbox-label">Active Status</span>
          </label>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Modal Footer -->
<div class="modal-footer border-0 modal-footer-custom">
  <button
    type="button"
    class="btn btn-sm btn-light border fw-medium px-4 fixed-width-btn"
    (click)="bsModalRef.hide()"
  >
    Close
  </button>
  <button
    type="button"
    class="btn btn-sm base-btn-primary fw-medium px-4 fixed-width-btn"
    (click)="onSaveOrUpdate()"
    [disabled]="isSaving"
  >
    <i
      *ngIf="isSaving"
      class="ti ti-loader-2 spin me-1 fs-13px"
      aria-hidden="true"
    ></i>
    {{ isSaving ? "Saving..." : "Save" }}
  </button>
</div>
