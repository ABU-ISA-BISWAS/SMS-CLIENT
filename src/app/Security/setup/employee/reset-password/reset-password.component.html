<div class="modal-header">
  <h5 class="modal-title" id="exampleModalLabel">Personnel Information</h5>
  <button type="button" (click)="bsModalRef.hide()" class="close" data-dismiss="modal" aria-label="Close"> <span
      aria-hidden="true">&times;</span> </button>
</div>
<div class="modal-body mx-3">
  <div class="row persoanlInfoArea">
    <div class="form-group row mx-auto">
    </div>
    <label for="exampleInput" class="col-md-4">Username</label>
    <input type="text" class="form-control col-md-8 mb-2" value="mJamil" disabled/>
    <label for="exampleInput" class="col-md-4">Old Password</label>
    <input type="password" placeholder="Enter the old password" class="form-control col-md-8 mb-2" />
    <label for="exampleInput" class="col-md-4">New Password</label>
    <input type="password" placeholder="Enter new password" class="form-control col-md-8 mb-2" />
    <label for="exampleInput" class="col-md-4">Confirm New Password</label>
    <input type="password" placeholder="Type new password again" class="form-control col-md-8 mb-2" />
  </div>
</div>
<div class="modal-footer">
  <button type="button" class="btn btn-primary">Save</button>
  <button type="button" (click)="bsModalRef.hide()" class="btn btn-danger" data-dismiss="modal">Close</button>
</div>
