<!-- Modal Header -->
<div class="modal-header border-0 pb-0">
  <div class="d-flex align-items-center gap-2">
    <div class="modal-header-icon">
      <i class="ti ti-settings fs-16px" aria-hidden="true"></i>
    </div>
    <div>
      <h6 class="modal-title m-0 fw-bold base-txt-primary lh-1">{{ title }}</h6>
      <small class="text-body-secondary fs-11px"
        >Manage system configuration</small
      >
    </div>
  </div>
  <button
    type="button"
    class="modal-close-btn btn btn-sm btn-light border"
    aria-label="Close"
    (click)="bsModalRef.hide()"
  >
    <i class="ti ti-x fs-13px" aria-hidden="true"></i>
  </button>
</div>

<!-- Modal Body -->
<div class="modal-body pt-3 pb-2">
  <div class="sysconfig-form-grid">
    <!-- Config Key -->
    <div class="field-group">
      <label class="field-label"
        >Config Key <span class="text-danger">*</span></label
      >
      <div class="input-field-wrapper">
        <i class="ti ti-key field-icon-left" aria-hidden="true"></i>
        <input
          type="text"
          class="form-control field-input"
          placeholder="Enter config key"
          [(ngModel)]="systemConfig.configKey"
        />
      </div>
    </div>

    <!-- Config Group -->
    <div class="field-group">
      <label class="field-label"
        >Config Group <span class="text-danger">*</span></label
      >
      <div class="input-field-wrapper">
        <i class="ti ti-layout-list field-icon-left" aria-hidden="true"></i>
        <select
          class="form-select field-select"
          [(ngModel)]="systemConfig.configGroup"
          name="configGroup"
        >
          <option value="" disabled selected>Select group</option>
          <option value="GENERAL">GENERAL</option>
          <option value="SMS">SMS</option>
          <option value="EMAIL">EMAIL</option>
          <option value="FEE">FEE</option>
          <option value="ATTENDANCE">ATTENDANCE</option>
          <option value="RESULT">RESULT</option>
        </select>
      </div>
    </div>

    <!-- Config Value -->
    <div class="field-group sysconfig-col-full">
      <label class="field-label"
        >Config Value <span class="text-danger">*</span></label
      >
      <div class="input-field-wrapper">
        <i class="ti ti-code field-icon-left" aria-hidden="true"></i>
        <input
          type="text"
          class="form-control field-input"
          placeholder="Enter config value"
          [(ngModel)]="systemConfig.configValue"
        />
      </div>
    </div>

    <!-- Description -->
    <div class="field-group sysconfig-col-full">
      <label class="field-label"
        >Description <span class="text-danger">*</span></label
      >
      <textarea
        class="form-control field-textarea"
        rows="3"
        placeholder="Enter description"
        [(ngModel)]="systemConfig.description"
      ></textarea>
    </div>

    <!-- Checkboxes -->
    <div class="field-group sysconfig-col-full">
      <div class="checkbox-row">
        <label class="checkbox-item">
          <input
            type="checkbox"
            [(ngModel)]="systemConfig.activeStatus"
            class="checkbox-input"
          />
          <span class="checkbox-label">Active Status</span>
        </label>
        <label class="checkbox-item">
          <input
            type="checkbox"
            [(ngModel)]="systemConfig.isEditable"
            class="checkbox-input"
          />
          <span class="checkbox-label">Is Editable</span>
        </label>
      </div>
    </div>
  </div>
</div>

<!-- Modal Footer -->
<div class="modal-footer border-0 modal-footer-custom">
  <button
    type="button"
    class="btn btn-sm btn-light border fw-medium px-4 fixed-width-btn"
    (click)="bsModalRef.hide()"
  >
    Close
  </button>
  <button
    type="button"
    class="btn btn-sm base-btn-primary fw-medium px-4 fixed-width-btn"
    (click)="saveConfigs()"
    [disabled]="isSaving"
  >
    <i
      *ngIf="isSaving"
      class="ti ti-loader-2 spin me-1 fs-13px"
      aria-hidden="true"
    ></i>
    {{ isSaving ? "Saving..." : "Save" }}
  </button>
</div>
