<div class="row">
  <div class="col-md-12 pl-2">
    <div class="all_content_wrapper responsiveTable">
      <div class="allInner">
        <div class="pannelArea mt-2">
          <div class="pannelHeading">
            <h5 class="subHeading subHeadingDocSetup col-md-2 col-sm-4">Themes</h5>
          </div>

          <div class="row py-4">
            <div class="col-12 col-sm-2 col-md-4 col-lg-2 mb-3" *ngFor="let theme of themes" (click)="setTheme(theme)">
                <div class="card rounded overflow-hidden border">
                    <div class="card-body d-flex align-items-center justify-content-center"
                      [ngStyle]="{backgroundColor: theme.colorCode}"
                    >
                      <h6 class="mb-0 text-center" *ngIf="theme.id == selectedTheme.id" [ngStyle]="{color: theme.textColor}" >Selected</h6>
                    </div>
                    <div class="card-footer bg-light-lighten d-flex align-items-center justify-content-between">
                        <div>{{theme.name}}</div>
                        <div class="fs-6">{{theme.colorCode}}</div>
                    </div>
                </div>
            </div>
          </div>

        </div>
      </div>
    </div>
  </div>
</div>
