<!-- Modal Header -->
<div class="modal-header border-0 pb-0">
  <div class="d-flex align-items-center gap-2">
    <div class="modal-header-icon">
      <i class="ti ti-clock fs-16px" aria-hidden="true"></i>
    </div>
    <div>
      <h6 class="modal-title m-0 fw-bold base-txt-primary lh-1">{{ title }}</h6>
      <small class="text-body-secondary fs-11px">Manage academic shift</small>
    </div>
  </div>
  <button
    type="button"
    class="modal-close-btn btn btn-sm btn-light border"
    aria-label="Close"
    (click)="bsModalRef.hide()"
  >
    <i class="ti ti-x fs-13px" aria-hidden="true"></i>
  </button>
</div>

<!-- Modal Body -->
<div class="modal-body pt-3 pb-2">
  <!-- Shift Name -->
  <div class="field-group">
    <label class="field-label"
      >Shift Name <span class="text-danger">*</span></label
    >
    <div class="input-field-wrapper">
      <i class="ti ti-clock field-icon-left" aria-hidden="true"></i>
      <input
        type="text"
        class="form-control field-input"
        placeholder="Enter shift name"
        [(ngModel)]="academicShift.shiftName"
      />
    </div>
  </div>

  <!-- Start & End Time -->
  <div class="shift-time-grid">
    <div class="field-group">
      <label class="field-label">Start Time</label>
      <div class="input-field-wrapper">
        <i class="ti ti-player-play field-icon-left" aria-hidden="true"></i>
        <input
          type="time"
          class="form-control field-input"
          [(ngModel)]="academicShift.startTime"
        />
      </div>
    </div>
    <div class="field-group">
      <label class="field-label">End Time</label>
      <div class="input-field-wrapper">
        <i class="ti ti-player-stop field-icon-left" aria-hidden="true"></i>
        <input
          type="time"
          class="form-control field-input"
          [(ngModel)]="academicShift.endTime"
        />
      </div>
    </div>
  </div>

  <!-- Status -->
  <div class="checkbox-row">
    <label class="checkbox-item">
      <input
        type="checkbox"
        [(ngModel)]="academicShift.activeStatus"
        class="checkbox-input"
      />
      <span class="checkbox-label">Active Status</span>
    </label>
  </div>
</div>

<!-- Modal Footer -->
<div class="modal-footer border-0 modal-footer-custom">
  <button
    type="button"
    class="btn btn-sm btn-light border fw-medium px-4 fixed-width-btn"
    (click)="bsModalRef.hide()"
  >
    Close
  </button>
  <button
    type="button"
    class="btn btn-sm base-btn-primary fw-medium px-4 fixed-width-btn"
    (click)="saveShifts()"
    [disabled]="isSaving"
  >
    <i
      *ngIf="isSaving"
      class="ti ti-loader-2 spin me-1 fs-13px"
      aria-hidden="true"
    ></i>
    {{ isSaving ? "Saving..." : "Save" }}
  </button>
</div>
