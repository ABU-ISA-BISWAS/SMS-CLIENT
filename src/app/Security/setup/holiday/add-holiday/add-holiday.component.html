<!-- Modal Header -->
<div class="modal-header border-0 pb-0">
  <div class="d-flex align-items-center gap-2">
    <div class="modal-header-icon">
      <i class="ti ti-beach fs-16px" aria-hidden="true"></i>
    </div>
    <div>
      <h6 class="modal-title m-0 fw-bold base-txt-primary lh-1">{{ title }}</h6>
      <small class="text-body-secondary fs-11px"
        >Manage holiday information</small
      >
    </div>
  </div>
  <button
    type="button"
    class="modal-close-btn btn btn-sm btn-light border"
    aria-label="Close"
    (click)="bsModalRef.hide()"
  >
    <i class="ti ti-x fs-13px" aria-hidden="true"></i>
  </button>
</div>

<!-- Modal Body -->
<div class="modal-body pt-3 pb-2">
  <div class="holiday-form-grid">
    <!-- Holiday Name -->
    <div class="field-group">
      <label class="field-label"
        >Holiday Name <span class="text-danger">*</span></label
      >
      <div class="input-field-wrapper">
        <i class="ti ti-calendar-event field-icon-left" aria-hidden="true"></i>
        <input
          type="text"
          class="form-control field-input"
          placeholder="Enter holiday name"
          [(ngModel)]="holiday.holidayName"
        />
      </div>
    </div>

    <!-- Holiday Name Bangla -->
    <div class="field-group">
      <label class="field-label">নাম (বাংলায়)</label>
      <div class="input-field-wrapper">
        <i class="ti ti-language field-icon-left" aria-hidden="true"></i>
        <input
          type="text"
          class="form-control field-input"
          placeholder="ছুটির নাম বাংলায়"
          [(ngModel)]="holiday.holidayNameBn"
        />
      </div>
    </div>

    <!-- Academic Session -->
    <div class="field-group">
      <label class="field-label">Academic Session</label>
      <div class="input-field-wrapper">
        <i class="ti ti-calendar field-icon-left" aria-hidden="true"></i>
        <select
          class="form-select field-select"
          [(ngModel)]="holiday.academicSessionNo"
          name="academicSessionNo"
        >
          <option [ngValue]="undefined">-- Select Session --</option>
          <option *ngFor="let s of sessionList" [ngValue]="s.id">
            {{ s.sessionName }}
          </option>
        </select>
      </div>
    </div>

    <!-- Holiday Type -->
    <div class="field-group">
      <label class="field-label"
        >Holiday Type <span class="text-danger">*</span></label
      >
      <div class="input-field-wrapper">
        <i class="ti ti-tag field-icon-left" aria-hidden="true"></i>
        <select
          class="form-select field-select"
          [(ngModel)]="holiday.holidayType"
        >
          <option [ngValue]="undefined">-- Select Type --</option>
          <option *ngFor="let t of holidayTypes" [value]="t.value">
            {{ t.label }}
          </option>
        </select>
      </div>
    </div>

    <!-- From Date -->
    <div class="field-group">
      <label class="field-label"
        >From Date <span class="text-danger">*</span></label
      >
      <div class="input-field-wrapper">
        <i class="ti ti-calendar-plus field-icon-left" aria-hidden="true"></i>
        <input
          type="date"
          class="form-control field-input"
          [(ngModel)]="holiday.fromDate"
        />
      </div>
    </div>

    <!-- To Date -->
    <div class="field-group">
      <label class="field-label"
        >To Date <span class="text-danger">*</span></label
      >
      <div class="input-field-wrapper">
        <i class="ti ti-calendar-minus field-icon-left" aria-hidden="true"></i>
        <input
          type="date"
          class="form-control field-input"
          [(ngModel)]="holiday.toDate"
        />
      </div>
    </div>

    <!-- Checkboxes -->
    <div class="field-group holiday-col-full">
      <div class="checkbox-row">
        <label class="checkbox-item">
          <input
            type="checkbox"
            [(ngModel)]="holiday.isRecurring"
            class="checkbox-input"
          />
          <span class="checkbox-label">Recurring Every Year</span>
        </label>
        <label class="checkbox-item">
          <input
            type="checkbox"
            [(ngModel)]="holiday.activeStatus"
            class="checkbox-input"
          />
          <span class="checkbox-label">Active Status</span>
        </label>
      </div>
    </div>
  </div>
</div>

<!-- Modal Footer -->
<div class="modal-footer border-0 modal-footer-custom">
  <button
    type="button"
    class="btn btn-sm btn-light border fw-medium px-4 fixed-width-btn"
    (click)="bsModalRef.hide()"
  >
    Close
  </button>
  <button
    type="button"
    class="btn btn-sm base-btn-primary fw-medium px-4 fixed-width-btn"
    (click)="saveHoliday()"
    [disabled]="isSaving"
  >
    <i
      *ngIf="isSaving"
      class="ti ti-loader-2 spin me-1 fs-13px"
      aria-hidden="true"
    ></i>
    {{ isSaving ? "Saving..." : "Save" }}
  </button>
</div>
